<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort setzen | Versorgungs-Kompass</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="18" fill="%23f4f6ff"/><rect x="11" y="9" width="18" height="18" rx="6" transform="rotate(45 20 18)" fill="%232788f6"/><rect x="34" y="24" width="18" height="18" rx="6" transform="rotate(45 43 33)" fill="%23ff7f3f"/><rect x="11" y="39" width="18" height="18" rx="6" transform="rotate(45 20 48)" fill="%2310236e"/></svg>'
    />
    <script src="./auth-config.js"></script>
    <script src="./auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../data/supabase-config.js"></script>
    <script src="../data/data-service.js"></script>
    <style>
      :root {
        color-scheme: light;
        --page: #f4f6ff;
        --page-2: #eaf0ff;
        --text: #1a2559;
        --muted: #667294;
        --line: #d9def5;
        --card: rgba(255, 255, 255, 0.94);
        --blue: #2788f6;
        --orange: #ff7f3f;
        --deep: #10236e;
        --success-bg: #edf9f3;
        --success-text: #247249;
        --error-bg: #fff1ec;
        --error-text: #a14d3b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(39, 136, 246, 0.14), transparent 24%),
          radial-gradient(circle at 100% 10%, rgba(255, 127, 63, 0.12), transparent 20%),
          linear-gradient(180deg, var(--page) 0%, var(--page-2) 100%);
      }

      .login-shell {
        width: min(100%, 520px);
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 28px 70px rgba(26, 37, 89, 0.14);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .login-stack {
        display: grid;
        gap: 18px;
        margin-top: 26px;
      }

      .brand { display: flex; align-items: center; gap: 16px; }
      .brand-mark { position: relative; width: 52px; height: 52px; flex: 0 0 auto; }
      .brand-mark span { position: absolute; width: 18px; height: 18px; border-radius: 8px; transform: rotate(45deg); }
      .brand-mark span:nth-child(1) { background: var(--blue); top: 2px; left: 7px; }
      .brand-mark span:nth-child(2) { background: var(--orange); top: 17px; left: 21px; }
      .brand-mark span:nth-child(3) { background: var(--deep); top: 31px; left: 7px; }
      .brand-copy strong { display: block; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; }
      .brand-copy p { margin: 4px 0 0; color: var(--muted); font-size: 0.92rem; }

      .login-card {
        margin-top: 22px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
      }

      .login-card p { margin: 10px 0 0; color: var(--muted); line-height: 1.5; }
      .login-card h1 { margin: 0; font-size: 1.35rem; line-height: 1.2; letter-spacing: -0.02em; }
      form { margin-top: 22px; display: grid; gap: 14px; }
      label { font-size: 0.85rem; font-weight: 800; color: #3b4978; }

      input {
        width: 100%;
        min-height: 52px;
        padding: 0 16px;
        border: 1px solid #cfd7fb;
        border-radius: 16px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
        box-shadow: 0 8px 24px rgba(49, 75, 153, 0.06);
      }

      input:focus {
        outline: none;
        border-color: #8eb2ff;
        box-shadow: 0 0 0 4px rgba(74, 121, 237, 0.12);
      }

      .login-button {
        min-height: 50px;
        border: 0;
        border-radius: 16px;
        background: linear-gradient(135deg, #275ee6, #4d90ff);
        color: #ffffff;
        font-size: 0.96rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        cursor: pointer;
      }

      .login-button:disabled { cursor: wait; opacity: 0.82; }

      .message {
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 0.88rem;
        font-weight: 700;
        line-height: 1.4;
      }

      .message.error { background: var(--error-bg); color: var(--error-text); }
      .message.success { background: var(--success-bg); color: var(--success-text); }

      .teaser-card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
        box-shadow: 0 10px 28px rgba(49, 75, 153, 0.08);
      }

      .teaser-frame {
        display: block;
        width: 100%;
        height: 240px;
        border: 0;
        pointer-events: none;
        background: #f3f5f7;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="brand-copy">
          <strong id="login-app-name">Versorgungs-Kompass</strong>
          <p>Das gematik-Hospitationsnetzwerk</p>
        </div>
      </div>

      <div class="login-stack">
        <section class="teaser-card" aria-label="Karten-Vorschau">
          <iframe
            class="teaser-frame"
            title="Mini-Vorschau des Karten-Modus"
            src="../map/versorgungs-kompass-map-teaser.html"
            loading="lazy"
            tabindex="-1"
          ></iframe>
        </section>

        <section class="login-card" aria-labelledby="password-title">
          <h1 id="password-title">Passwort festlegen</h1>
          <p id="password-copy">Lege Dein Passwort fest, um den Versorgungs-Kompass zu öffnen.</p>

          <form id="password-form">
            <div>
              <label for="password">Neues Passwort</label>
              <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
            </div>
            <div>
              <label for="password-confirm">Passwort wiederholen</label>
              <input id="password-confirm" name="password-confirm" type="password" autocomplete="new-password" minlength="8" required />
            </div>
            <div class="message error" id="password-error" hidden>Der Einladungslink ist ungültig oder abgelaufen.</div>
            <div class="message success" id="password-success" hidden>Dein Passwort wurde gespeichert.</div>
            <button class="login-button" id="password-submit" type="submit" disabled>Passwort speichern</button>
          </form>
        </section>
      </div>
    </main>

    <script>
      (function () {
        const auth = window.VKAuth;
        const config = window.VK_AUTH_CONFIG || {};

        function getReturnUrl() {
          const params = new URLSearchParams(window.location.search);
          const returnTarget = params.get("return");
          if (!returnTarget) return auth?.getDefaultUrl?.() || config.defaultPath || "../app/versorgungs-kompass.html";
          if (/^https?:\/\//i.test(returnTarget)) return auth?.getDefaultUrl?.() || config.defaultPath || "../app/versorgungs-kompass.html";
          return returnTarget;
        }

        function setMessage(element, text) {
          if (!element) return;
          element.textContent = text;
          element.hidden = false;
        }

        function getHashParams() {
          const hash = window.location.hash.replace(/^#/, "");
          return new URLSearchParams(hash);
        }

        async function ensureSession(client) {
          const params = new URLSearchParams(window.location.search);
          const hashParams = getHashParams();
          const code = params.get("code");
          const accessToken = hashParams.get("access_token");
          const refreshToken = hashParams.get("refresh_token");

          if (code) {
            const { data, error } = await client.auth.exchangeCodeForSession(code);
            if (error) throw error;
            return data.session;
          }

          if (accessToken && refreshToken) {
            const { data, error } = await client.auth.setSession({
              access_token: accessToken,
              refresh_token: refreshToken
            });
            if (error) throw error;
            return data.session;
          }

          const { data, error } = await client.auth.getSession();
          if (error) throw error;
          return data.session;
        }

        window.addEventListener("DOMContentLoaded", async function () {
          const form = document.getElementById("password-form");
          const passwordInput = document.getElementById("password");
          const confirmInput = document.getElementById("password-confirm");
          const error = document.getElementById("password-error");
          const success = document.getElementById("password-success");
          const button = document.getElementById("password-submit");
          const title = document.getElementById("login-app-name");
          const copy = document.getElementById("password-copy");
          const useSupabase = Boolean(window.dataService?.isConfigured?.());

          if (title) title.textContent = config.appName || "Versorgungs-Kompass";
          if (!form || !passwordInput || !confirmInput || !error || !success || !button) return;

          if (!useSupabase) {
            setMessage(error, "Supabase ist aktuell nicht konfiguriert. Bitte nutze den normalen Login.");
            return;
          }

          const supabaseClient = window.dataService.getClient();

          try {
            const session = await ensureSession(supabaseClient);
            if (!session?.access_token) {
              setMessage(error, "Der Einladungslink ist ungültig oder abgelaufen. Bitte fordere eine neue Einladung an.");
              return;
            }
            button.disabled = false;
            if (copy) copy.textContent = "Wähle ein neues Passwort mit mindestens 8 Zeichen.";
            passwordInput.focus();
          } catch (sessionError) {
            console.warn("Einladungslink konnte nicht verarbeitet werden.", sessionError);
            setMessage(error, "Der Einladungslink ist ungültig oder abgelaufen. Bitte fordere eine neue Einladung an.");
            return;
          }

          form.addEventListener("submit", async function (event) {
            event.preventDefault();
            error.hidden = true;
            success.hidden = true;

            const password = passwordInput.value;
            const confirmation = confirmInput.value;

            if (password.length < 8) {
              setMessage(error, "Bitte wähle ein Passwort mit mindestens 8 Zeichen.");
              passwordInput.focus();
              return;
            }

            if (password !== confirmation) {
              setMessage(error, "Die Passwörter stimmen nicht überein.");
              confirmInput.focus();
              confirmInput.select();
              return;
            }

            button.disabled = true;
            button.textContent = "Speichere Passwort …";

            try {
              const { error: updateError } = await supabaseClient.auth.updateUser({ password });
              if (updateError) throw updateError;
              auth?.setAuthenticated?.();
              setMessage(success, "Dein Passwort wurde gespeichert. Du wirst weitergeleitet.");
              window.setTimeout(function () {
                window.location.replace(getReturnUrl());
              }, 700);
            } catch (updateError) {
              console.warn("Passwort konnte nicht gespeichert werden.", updateError);
              setMessage(error, "Das Passwort konnte nicht gespeichert werden. Bitte prüfe den Link oder fordere eine neue Einladung an.");
              button.disabled = false;
              button.textContent = "Passwort speichern";
            }
          });
        });
      })();
    </script>
  </body>
</html>
