services:
  - type: web
    name: versorgungs-crm
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/crm.sqlite
    disk:
      name: crm-data
      mountPath: /var/data
      sizeGB: 1
