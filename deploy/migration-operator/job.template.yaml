apiVersion: batch/v1
kind: Job
metadata:
  name: vk-pre-gematik-migration-operator
  namespace: pre-gematik
  labels:
    app.kubernetes.io/name: versorgungs-kompass
    app.kubernetes.io/component: migration-operator
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: versorgungs-kompass
        app.kubernetes.io/component: migration-operator
    spec:
      restartPolicy: Never
      serviceAccountName: vk-pre-gematik-migration-operator
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: REPLACE_WITH_IMMUTABLE_OPERATOR_IMAGE
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: vk-pre-gematik-migration-environment
          env:
            - name: CLOUD_SQL_AUTH_PROXY_CONNECT_MODE
              value: private-ip
            - name: CLOUD_SQL_AUTH_PROXY_EXECUTABLE
              value: /usr/local/bin/cloud-sql-proxy
            - name: HOME
              value: /tmp/home
            - name: CLOUDSDK_CONFIG
              value: /tmp/gcloud
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: secret-input
              mountPath: /secret-input
              readOnly: true
            - name: protected-input
              mountPath: /protected-input
            - name: protected-output
              mountPath: /protected-output
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: secret-input
          secret:
            secretName: vk-pre-gematik-migration-input
            optional: true
            defaultMode: 0440
        - name: protected-input
          emptyDir:
            sizeLimit: 16Mi
        - name: protected-output
          emptyDir:
            sizeLimit: 256Mi
        - name: temporary
          emptyDir:
            sizeLimit: 256Mi
