apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "versorgungs-kompass.fullname" . }}-api
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.containerPort | quote }}
  ALLOWED_ORIGIN: {{ .Values.config.allowedOrigin | quote }}
  API_AUTH_MODE: {{ .Values.config.apiAuthMode | quote }}
  IAP_JWT_AUDIENCE: {{ .Values.config.iapJwtAudience | quote }}
  {{- if eq .Values.config.apiAuthMode "oidc" }}
  OIDC_ISSUER: {{ .Values.config.oidcIssuer | quote }}
  OIDC_AUDIENCE: {{ .Values.config.oidcAudience | quote }}
  OIDC_JWKS_URL: {{ .Values.config.oidcJwksUrl | quote }}
  {{- else }}
  OIDC_ISSUER: ""
  OIDC_AUDIENCE: ""
  OIDC_JWKS_URL: ""
  {{- end }}
  OIDC_EMAIL_CLAIM: {{ .Values.config.oidcEmailClaim | quote }}
  OIDC_SUBJECT_CLAIM: {{ .Values.config.oidcSubjectClaim | quote }}
  ATTACHMENT_UPLOAD_MODE: {{ .Values.config.attachmentUploadMode | quote }}
  IMAGE_UPLOAD_MODE: {{ .Values.config.imageUploadMode | quote }}
  API_LOG_REQUESTS: {{ .Values.config.logRequests | quote }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_USER: {{ .Values.database.user | quote }}
  DB_SSL: {{ .Values.database.ssl | quote }}
  {{- if .Values.database.sslCaSecretName }}
  DB_SSL_CA_FILE: "/run/secrets/postgres/ca.crt"
  {{- end }}
  DB_SSL_SERVERNAME: {{ .Values.database.sslServerName | quote }}
  DB_POOL_MAX: {{ .Values.database.poolMax | quote }}
  PROFILE_IMAGE_BUCKET: {{ .Values.storage.profileImageBucket | quote }}
  CONTACT_IMAGE_BUCKET: {{ .Values.storage.contactImageBucket | quote }}
  CONTACT_NOTE_ATTACHMENT_BUCKET: {{ .Values.storage.contactNoteAttachmentBucket | quote }}
  STAKEHOLDER_LOGO_BUCKET: {{ .Values.storage.stakeholderLogoBucket | quote }}
