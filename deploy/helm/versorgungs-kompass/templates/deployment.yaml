apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "versorgungs-kompass.fullname" . }}-api
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      maxSurge: {{ .Values.rollout.maxSurge }}
  selector:
    matchLabels:
      {{- include "versorgungs-kompass.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "versorgungs-kompass.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "versorgungs-kompass.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ if .Values.image.digest }}"{{ .Values.image.repository }}@{{ .Values.image.digest }}"{{ else }}"{{ .Values.image.repository }}:{{ .Values.image.tag }}"{{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "versorgungs-kompass.fullname" . }}-api
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.databasePasswordSecretName | quote }}
                  key: {{ .Values.secrets.databasePasswordSecretKey | quote }}
                  optional: false
          {{- if .Values.database.sslCaSecretName }}
          volumeMounts:
            - name: postgres-ca
              mountPath: /run/secrets/postgres
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- if .Values.gke.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: {{ .Values.gke.cloudSqlProxy.image | quote }}
          imagePullPolicy: {{ .Values.gke.cloudSqlProxy.imagePullPolicy }}
          args:
            - "--private-ip"
            - "--structured-logs"
            - "--port={{ .Values.gke.cloudSqlProxy.port }}"
            - {{ required "gke.cloudSqlProxy.instanceConnectionName is required when the proxy is enabled" .Values.gke.cloudSqlProxy.instanceConnectionName | quote }}
          resources:
            {{- toYaml .Values.gke.cloudSqlProxy.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.gke.cloudSqlProxy.securityContext | nindent 12 }}
        {{- end }}
      {{- if .Values.database.sslCaSecretName }}
      volumes:
        - name: postgres-ca
          secret:
            secretName: {{ .Values.database.sslCaSecretName | quote }}
            items:
              - key: {{ .Values.database.sslCaSecretKey | quote }}
                path: ca.crt
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "versorgungs-kompass.selectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "versorgungs-kompass.selectorLabels" . | nindent 14 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
