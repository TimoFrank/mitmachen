{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "versorgungs-kompass.fullname" . }}-api
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "versorgungs-kompass.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingress.apiAllowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 3307
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.metadataServer.dataplaneV2Ip | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.metadataServer.workloadIdentityIp | quote }}
      ports:
        - protocol: TCP
          port: 987
        - protocol: TCP
          port: 988
{{- if .Values.frontend.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "versorgungs-kompass.frontendFullname" . }}
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "versorgungs-kompass.frontendSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingress.frontendAllowedCidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.metadataServer.dataplaneV2Ip | quote }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.metadataServer.workloadIdentityIp | quote }}
      ports:
        - protocol: TCP
          port: 987
        - protocol: TCP
          port: 988
{{- end }}
{{- end }}
