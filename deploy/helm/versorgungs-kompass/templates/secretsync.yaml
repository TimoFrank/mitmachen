{{- if .Values.gke.secretSync.enabled -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "versorgungs-kompass.gkeSecretProviderClassName" . }}
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/{{ required "gke.secretSync.projectId is required" .Values.gke.secretSync.projectId }}/secrets/{{ required "gke.secretSync.secretName is required" .Values.gke.secretSync.secretName }}/versions/{{ .Values.gke.secretSync.secretVersion }}"
        path: "db-password"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: {{ .Values.secrets.databasePasswordSecretName | quote }}
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  serviceAccountName: {{ include "versorgungs-kompass.serviceAccountName" . }}
  secretProviderClassName: {{ include "versorgungs-kompass.gkeSecretProviderClassName" . }}
  secretObject:
    type: Opaque
    data:
      - sourcePath: "db-password"
        targetKey: {{ .Values.secrets.databasePasswordSecretKey | quote }}
{{- end }}
