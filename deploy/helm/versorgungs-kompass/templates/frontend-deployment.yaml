{{- if .Values.frontend.enabled -}}
{{- $frontendBucket := required "frontend.bucketName is required when frontend.enabled is true" .Values.frontend.bucketName -}}
{{- $frontendRevision := required "frontend.contentRevision is required when frontend.enabled is true" .Values.frontend.contentRevision -}}
{{- $frontendReleasePrefix := trimAll "/" (.Values.frontend.releasePrefix | default "releases") -}}
{{- $podAnnotations := deepCopy (.Values.frontend.podAnnotations | default dict) -}}
{{- with .Values.frontend.contentRevision -}}
{{- $_ := set $podAnnotations "checksum/frontend-content" . -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "versorgungs-kompass.frontendFullname" . }}
  labels:
    {{- include "versorgungs-kompass.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      maxSurge: {{ .Values.rollout.maxSurge }}
  selector:
    matchLabels:
      {{- include "versorgungs-kompass.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "versorgungs-kompass.frontendSelectorLabels" . | nindent 8 }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "versorgungs-kompass.frontendServiceAccountName" . }}
      automountServiceAccountToken: {{ .Values.frontend.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      initContainers:
        - name: sync-frontend
          image: {{ .Values.frontend.sync.image | quote }}
          imagePullPolicy: {{ .Values.frontend.sync.imagePullPolicy }}
          command:
            - gcloud
          args:
            - --quiet
            - storage
            - rsync
            - --recursive
            - {{ printf "gs://%s/%s/%s" $frontendBucket $frontendReleasePrefix $frontendRevision | quote }}
            - /workspace
          env:
            - name: CLOUDSDK_CONFIG
              value: /tmp/gcloud
            - name: CLOUDSDK_CORE_DISABLE_PROMPTS
              value: "1"
          resources:
            {{- toYaml .Values.frontend.sync.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.sync.securityContext | nindent 12 }}
          volumeMounts:
            - name: frontend-content
              mountPath: /workspace
            - name: frontend-runtime
              mountPath: /tmp
      containers:
        - name: nginx
          image: {{ .Values.frontend.nginx.image | quote }}
          imagePullPolicy: {{ .Values.frontend.nginx.imagePullPolicy }}
          ports:
            - name: frontend-http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /index.html
              port: frontend-http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /index.html
              port: frontend-http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.nginx.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.nginx.securityContext | nindent 12 }}
          volumeMounts:
            - name: frontend-content
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: frontend-runtime
              mountPath: /tmp
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "versorgungs-kompass.frontendSelectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "versorgungs-kompass.frontendSelectorLabels" . | nindent 14 }}
      volumes:
        - name: frontend-content
          emptyDir:
            sizeLimit: {{ .Values.frontend.contentSizeLimit | quote }}
        - name: frontend-runtime
          emptyDir:
            sizeLimit: 64Mi
        - name: frontend-nginx-config
          configMap:
            name: {{ include "versorgungs-kompass.frontendFullname" . }}-nginx
            defaultMode: 0444
{{- end }}
