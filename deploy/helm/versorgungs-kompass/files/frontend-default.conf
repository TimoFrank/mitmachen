map $request_uri $vk_cache_control {
  default "no-store";
  ~^/data/runtime-config\.js(?:\?|$) "no-store";
  ~*\.(?:css|js|json|png|jpe?g|gif|webp|svg|ico|woff2?)(?:\?|$) "public, max-age=3600";
}

map $uri $vk_frame_ancestors {
  default "'none'";
  ~^/map/ "'self'";
  ~^/versorgungs-kompass\.html$ "'self'";
  ~^/versorgungs-kompass-(?:map|map-teaser|contact-mini-map)\.html$ "'self'";
}

map $uri $vk_frame_options {
  default "DENY";
  ~^/map/ "SAMEORIGIN";
  ~^/versorgungs-kompass\.html$ "SAMEORIGIN";
  ~^/versorgungs-kompass-(?:map|map-teaser|contact-mini-map)\.html$ "SAMEORIGIN";
}

server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors $vk_frame_ancestors; form-action 'self'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; media-src 'self'; manifest-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests" always;
  add_header Cache-Control $vk_cache_control always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options $vk_frame_options always;

  location = /data/runtime-config.js {
    try_files $uri =404;
  }

  location ~* \.(?:css|js|json|png|jpe?g|gif|webp|svg|ico|woff2?)$ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
