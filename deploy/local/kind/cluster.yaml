kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: versorgungs-kompass-local
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://host.docker.internal:5001"]
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 18080
        protocol: TCP
      - containerPort: 443
        hostPort: 18443
        protocol: TCP
