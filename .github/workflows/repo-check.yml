name: Repo check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-check:
    name: Minimal repository check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run minimal checks
        run: npm run check
