name: Repo check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-check:
    name: Minimal repository check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run minimal checks
        run: npm run check

      - name: Verify dependency advisory and registry signatures
        run: |
          npm audit --audit-level=high
          npm audit signatures

      - name: Run pinned local SAST rules
        run: |
          docker run --rm \
            --network=none \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=256m \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e SEMGREP_SEND_METRICS=off \
            -e SEMGREP_ENABLE_VERSION_CHECK=0 \
            -v "$PWD:/src:ro" \
            semgrep/semgrep:1.164.0@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d \
            semgrep scan --error --metrics=off --timeout=60 --max-target-bytes=5000000 --config /src/config/security/semgrep.yml /src

      - name: Scan complete Git history and current tree for secrets
        run: |
          docker run --rm \
            --network=none \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --config /repo/config/security/gitleaks.toml --gitleaks-ignore-path /repo/config/security/gitleaksignore --redact --verbose
          docker run --rm \
            --network=none \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --user "$(id -u):$(id -g)" \
            --workdir /repo \
            -e HOME=/tmp \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            dir . --config /repo/config/security/gitleaks.toml --gitleaks-ignore-path /repo/config/security/gitleaksignore --redact --verbose
