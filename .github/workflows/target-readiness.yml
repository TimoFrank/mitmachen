name: Target readiness

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "api/**"
      - "config/**"
      - "deploy/**"
      - "dokumentation/architektur/**"
      - "dokumentation/betrieb-und-deployment/**"
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".dockerignore"
      - "api/**"
      - "config/**"
      - "deploy/**"
      - "dokumentation/architektur/**"
      - "dokumentation/betrieb-und-deployment/**"
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  target-readiness:
    name: PoC-/Target-Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check PoC RC contracts
        run: npm run check:poc-rc

      - name: Build and smoke-test API container
        shell: bash
        run: |
          set -euo pipefail
          image_name="versorgungs-kompass-api:target-readiness"
          container_name="vk-api-target-readiness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm --force "$container_name" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker build --file api/Dockerfile --tag "$image_name" .
          docker run --detach \
            --name "$container_name" \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --publish 127.0.0.1:18081:8080 \
            --env API_AUTH_MODE=iap \
            --env ALLOWED_ORIGIN=https://poc.example.invalid \
            --env IAP_JWT_AUDIENCE=/projects/123456789/global/backendServices/123456789 \
            "$image_name"

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:18081/api/healthz >/dev/null; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "$container_name" | grep --quiet true; then
              docker logs "$container_name"
              exit 1
            fi
            sleep 2
          done

          docker logs "$container_name"
          echo "The API container did not become healthy." >&2
          exit 1

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.19.0

      - name: Render and validate minimal PoC Helm chart
        run: |
          chart='deploy/helm/versorgungs-kompass'
          helm lint "$chart" \
            --values "$chart/values-poc-gematik.yaml" \
            --set-string image.digest=sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          helm template poc-readiness "$chart" \
            --namespace versorgungs-kompass-poc \
            --values "$chart/values-poc-gematik.yaml" \
            --set-string image.digest=sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb \
            >/tmp/versorgungs-kompass-poc.yaml
          test -s /tmp/versorgungs-kompass-poc.yaml
