name: Deploy pre-gematik (GKE Autopilot)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional immutable image tag; blank creates a unique run tag
        required: false
        type: string
      validate_only:
        description: Validate repository artifacts without accessing GCP
        required: false
        default: true
        type: boolean
      require_external_smoke:
        description: Require the public API URL to be reachable and protected by IAP
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      image_tag:
        description: Optional immutable image tag; blank creates a unique run tag
        required: false
        type: string
      validate_only:
        description: Validate repository artifacts without accessing GCP
        required: false
        default: true
        type: boolean
      require_external_smoke:
        description: Require the public API URL to be reachable and protected by IAP
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pre-gematik-${{ github.repository }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  IMAGE_NAME: versorgungs-kompass-api
  HELM_RELEASE: versorgungs-kompass
  CHART_PATH: deploy/helm/versorgungs-kompass
  GCP_VALUES_PATH: deploy/helm/versorgungs-kompass/values-gcp-autopilot.yaml

jobs:
  validate:
    name: Validate deployable artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.metadata.outputs.image_tag }}

    steps:
      - name: Checkout requested revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select immutable image tag
        id: metadata
        shell: bash
        env:
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          image_tag="${REQUESTED_IMAGE_TAG:-sha-${GITHUB_SHA:0:12}-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "The image tag is not a valid Docker tag." >&2
            exit 1
          fi
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.2.0

      - name: Lint and render GCP Helm overlay
        shell: bash
        run: |
          set -euo pipefail
          helm lint "$CHART_PATH" -f "$GCP_VALUES_PATH"
          helm template "$HELM_RELEASE" "$CHART_PATH" \
            --namespace pre-gematik \
            -f "$GCP_VALUES_PATH" \
            --set-string image.repository=europe-west3-docker.pkg.dev/example-project/versorgungs-kompass/versorgungs-kompass-api \
            --set-string image.tag="$IMAGE_TAG" \
            --set-string ingress.host=pre-gematik.example.invalid \
            --set-string "ingress.aliasHosts[0]=legacy-pre-gematik.example.invalid" \
            --set-string "ingress.annotations.kubernetes\\.io/ingress\\.global-static-ip-name=example-static-ip" \
            --set-string gke.managedCertificate.name=versorgungs-kompass-api \
            --set-string "gke.managedCertificate.domains[0]=pre-gematik.example.invalid" \
            --set-string "gke.managedCertificate.additionalCertificates[0].name=versorgungs-kompass-mitmachen" \
            --set-string "gke.managedCertificate.additionalCertificates[0].domains[0]=legacy-pre-gematik.example.invalid" \
            --set-string config.allowedOrigin=https://pre-gematik.example.invalid \
            --set-string config.apiAuthMode=iap \
            --set-string config.iapJwtAudience=/projects/123456789/global/backendServices/123456789 \
            --set-string frontend.backendConfig.iap.oauthClientCredentialsSecretName=example-iap-oauth \
            --set-string gke.backendConfig.iap.oauthClientCredentialsSecretName=example-iap-oauth \
            --set-string database.host=127.0.0.1 \
            --set-string database.ssl=disable \
            --set-string frontend.bucketName=example-frontend \
            --set-string frontend.contentRevision="$IMAGE_TAG" \
            --set-string "frontend.hostRedirects[0].host=legacy-pre-gematik.example.invalid" \
            --set-string "frontend.hostRedirects[0].targetOrigin=https://pre-gematik.example.invalid" \
            --set-string gke.cloudSqlProxy.instanceConnectionName=example-project:europe-west3:example-postgres \
            --set-string gke.secretSync.projectId=example-project \
            --set-string gke.secretSync.secretName=versorgungs-kompass-postgres \
            --set-string storage.profileImageBucket=example-profile-images \
            --set-string storage.contactImageBucket=example-contact-images \
            --set-string storage.contactNoteAttachmentBucket=example-contact-attachments \
            --set-string storage.stakeholderLogoBucket=example-stakeholder-logos \
            > /tmp/pre-gematik-rendered.yaml
          test -s /tmp/pre-gematik-rendered.yaml
          if grep --quiet 'REPLACE_' /tmp/pre-gematik-rendered.yaml; then
            echo "The rendered validation manifest still contains an unresolved placeholder." >&2
            exit 1
          fi
        env:
          IMAGE_TAG: ${{ steps.metadata.outputs.image_tag }}

      - name: Build target frontend artifact
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_static_frontend.sh \
            --profile target \
            --output dist/target \
            --api-base-url https://pre-gematik.example.invalid \
            --auth-mode iap
          node scripts/audit_target_assets.mjs --artifact-root dist/target
          node scripts/audit_api_gateway.mjs \
            --production-config dist/target/data/runtime-config.js
          jq --exit-status --raw-output \
            '.artifactDigest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' \
            dist/target/build-manifest.json >/dev/null

      - name: Build and smoke-test API container
        shell: bash
        run: |
          set -euo pipefail
          container_name="vk-api-validation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm --force "$container_name" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker build \
            --file api/Dockerfile \
            --tag "${IMAGE_NAME}:${IMAGE_TAG}" \
            .
          docker run --detach \
            --name "$container_name" \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --publish 127.0.0.1:18081:8080 \
            --env API_AUTH_MODE=iap \
            --env ALLOWED_ORIGIN=https://pre-gematik.example.invalid \
            --env IAP_JWT_AUDIENCE=/projects/123456789/global/backendServices/123456789 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:18081/api/healthz >/dev/null; then
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' "$container_name" | grep --quiet true; then
              docker logs "$container_name"
              exit 1
            fi
            sleep 2
          done

          docker logs "$container_name"
          echo "The API container did not become healthy." >&2
          exit 1
        env:
          IMAGE_TAG: ${{ steps.metadata.outputs.image_tag }}

  deploy:
    name: Deploy to GCP Autopilot
    if: ${{ inputs.validate_only != true }}
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: pre-gematik
      url: ${{ vars.FRONTEND_BASE_URL }}
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
      LEGACY_FRONTEND_HOST: ${{ vars.LEGACY_FRONTEND_HOST }}
      FRONTEND_BUCKET: ${{ vars.FRONTEND_BUCKET }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD_SECRET_NAME: ${{ vars.DB_PASSWORD_SECRET_NAME }}
      IAP_OAUTH_BOOTSTRAP_SECRET_NAME: ${{ vars.IAP_OAUTH_BOOTSTRAP_SECRET_NAME }}
      PROFILE_IMAGE_BUCKET: ${{ vars.PROFILE_IMAGE_BUCKET }}
      CONTACT_IMAGE_BUCKET: ${{ vars.CONTACT_IMAGE_BUCKET }}
      CONTACT_NOTE_ATTACHMENT_BUCKET: ${{ vars.CONTACT_NOTE_ATTACHMENT_BUCKET }}
      STAKEHOLDER_LOGO_BUCKET: ${{ vars.STAKEHOLDER_LOGO_BUCKET }}
      CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
      GKE_INGRESS_IP_NAME: ${{ vars.GKE_INGRESS_IP_NAME }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME: ${{ vars.IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME }}
      IAP_RESOURCE_ACCESS_PRINCIPAL: ${{ vars.IAP_RESOURCE_ACCESS_PRINCIPAL }}
      IAP_PROJECT_BREAK_GLASS_SHA256: ${{ secrets.IAP_PROJECT_BREAK_GLASS_SHA256 }}

    steps:
      - name: Checkout validated revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate pre-gematik environment variables
        id: config
        shell: bash
        run: |
          set -euo pipefail
          required=(
            GCP_PROJECT_ID GCP_REGION GKE_CLUSTER_NAME GKE_LOCATION
            WIF_PROVIDER DEPLOYER_SERVICE_ACCOUNT GAR_REPOSITORY
            API_BASE_URL FRONTEND_BASE_URL FRONTEND_BUCKET
            DB_NAME DB_USER DB_PASSWORD_SECRET_NAME
            IAP_OAUTH_BOOTSTRAP_SECRET_NAME
            PROFILE_IMAGE_BUCKET CONTACT_IMAGE_BUCKET
            CONTACT_NOTE_ATTACHMENT_BUCKET STAKEHOLDER_LOGO_BUCKET CLOUD_SQL_INSTANCE_CONNECTION_NAME
            GKE_INGRESS_IP_NAME K8S_NAMESPACE
            IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME IAP_RESOURCE_ACCESS_PRINCIPAL
            IAP_PROJECT_BREAK_GLASS_SHA256
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "GitHub Environment variable $name is missing." >&2
              exit 1
            fi
          done

          if [[ ! "$GCP_PROJECT_ID" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]$ ]]; then
            echo "GCP_PROJECT_ID is invalid." >&2
            exit 1
          fi
          if [[ ! "$GCP_REGION" =~ ^[a-z]+-[a-z]+[0-9]+$ ]] || [[ "$GKE_LOCATION" != "$GCP_REGION" ]]; then
            echo "GCP_REGION is invalid or GKE_LOCATION differs from the regional Terraform scaffold." >&2
            exit 1
          fi
          if [[ ! "$WIF_PROVIDER" =~ ^projects/[0-9]+/locations/global/workloadIdentityPools/[A-Za-z0-9_-]+/providers/[A-Za-z0-9_-]+$ ]]; then
            echo "WIF_PROVIDER must be a full Workload Identity Provider resource name." >&2
            exit 1
          fi
          if [[ ! "$DEPLOYER_SERVICE_ACCOUNT" =~ ^[A-Za-z0-9._%+-]+@[a-z][a-z0-9-]+\.iam\.gserviceaccount\.com$ ]]; then
            echo "DEPLOYER_SERVICE_ACCOUNT is invalid." >&2
            exit 1
          fi
          if [[ "$DEPLOYER_SERVICE_ACCOUNT" != *@"${GCP_PROJECT_ID}.iam.gserviceaccount.com" ]]; then
            echo "DEPLOYER_SERVICE_ACCOUNT does not belong to GCP_PROJECT_ID." >&2
            exit 1
          fi
          if [[ ! "$GAR_REPOSITORY" =~ ^[a-z0-9-]+-docker\.pkg\.dev/[a-z][a-z0-9-]+/[a-z0-9._-]+$ ]]; then
            echo "GAR_REPOSITORY must be the full Terraform output URI without an image name." >&2
            exit 1
          fi
          IFS=/ read -r registry_host registry_project registry_repository <<< "$GAR_REPOSITORY"
          if [[ "$registry_project" != "$GCP_PROJECT_ID" ]] || [[ "${registry_host%-docker.pkg.dev}" != "$GCP_REGION" ]]; then
            echo "GAR_REPOSITORY does not belong to GCP_PROJECT_ID/GCP_REGION." >&2
            exit 1
          fi
          if [[ ! "$K8S_NAMESPACE" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "K8S_NAMESPACE is invalid." >&2
            exit 1
          fi
          if [[ ! "$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" =~ ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$ ]]; then
            echo "IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME is not a valid Kubernetes Secret name." >&2
            exit 1
          fi
          if [[ ! "$IAP_OAUTH_BOOTSTRAP_SECRET_NAME" =~ ^[A-Za-z0-9_-]{1,255}$ ]]; then
            echo "IAP_OAUTH_BOOTSTRAP_SECRET_NAME is not a valid Secret Manager secret ID." >&2
            exit 1
          fi
          if [[ ! "$IAP_RESOURCE_ACCESS_PRINCIPAL" =~ ^(group|user):[^@[:space:]]+@[^@[:space:]]+$ ]]; then
            echo "IAP_RESOURCE_ACCESS_PRINCIPAL must use group:name@example.org or user:name@example.org syntax." >&2
            exit 1
          fi
          if [[ ! "$IAP_PROJECT_BREAK_GLASS_SHA256" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "IAP_PROJECT_BREAK_GLASS_SHA256 must be the protected canonical project-IAP policy pin." >&2
            exit 1
          fi
          if [[ ! "$CLOUD_SQL_INSTANCE_CONNECTION_NAME" =~ ^[^:]+:[^:]+:[^:]+$ ]]; then
            echo "CLOUD_SQL_INSTANCE_CONNECTION_NAME is invalid." >&2
            exit 1
          fi
          IFS=: read -r sql_project sql_region sql_instance <<< "$CLOUD_SQL_INSTANCE_CONNECTION_NAME"
          if [[ "$sql_project" != "$GCP_PROJECT_ID" ]] || [[ "$sql_region" != "$GCP_REGION" ]] || [[ -z "$sql_instance" ]]; then
            echo "CLOUD_SQL_INSTANCE_CONNECTION_NAME does not belong to GCP_PROJECT_ID/GCP_REGION." >&2
            exit 1
          fi
          if [[ ! "$GKE_INGRESS_IP_NAME" =~ ^[a-z]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "GKE_INGRESS_IP_NAME is invalid." >&2
            exit 1
          fi
          for bucket in "$FRONTEND_BUCKET" "$PROFILE_IMAGE_BUCKET" "$CONTACT_IMAGE_BUCKET" "$CONTACT_NOTE_ATTACHMENT_BUCKET" "$STAKEHOLDER_LOGO_BUCKET"; do
            if [[ ! "$bucket" =~ ^[a-z0-9][a-z0-9._-]{1,61}[a-z0-9]$ ]]; then
              echo "A bucket variable is not a plain valid bucket name." >&2
              exit 1
            fi
          done
          bucket_count="$(printf '%s\n' "$FRONTEND_BUCKET" "$PROFILE_IMAGE_BUCKET" "$CONTACT_IMAGE_BUCKET" "$CONTACT_NOTE_ATTACHMENT_BUCKET" "$STAKEHOLDER_LOGO_BUCKET" | sort --unique | wc -l | tr -d '[:space:]')"
          if [[ "$bucket_count" != "5" ]]; then
            echo "All frontend and protected data buckets must be distinct." >&2
            exit 1
          fi

          if [[ "$API_BASE_URL" =~ ^https://([A-Za-z0-9.-]+)$ ]]; then
            api_host="${BASH_REMATCH[1]}"
          else
            echo "API_BASE_URL must be an HTTPS origin without path, query, fragment, or trailing slash." >&2
            exit 1
          fi
          if [[ ! "$FRONTEND_BASE_URL" =~ ^https://[A-Za-z0-9.-]+$ ]]; then
            echo "FRONTEND_BASE_URL must be an HTTPS origin without path, query, fragment, or trailing slash." >&2
            exit 1
          fi
          if [[ "$API_BASE_URL" != "$FRONTEND_BASE_URL" ]]; then
            echo "API_BASE_URL and FRONTEND_BASE_URL must use the same origin in pre-gematik." >&2
            exit 1
          fi
          if [[ -n "${LEGACY_FRONTEND_HOST:-}" ]]; then
            if [[ ! "$LEGACY_FRONTEND_HOST" =~ ^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$ ]]; then
              echo "LEGACY_FRONTEND_HOST must be a lowercase DNS host without scheme, port, path, query, or fragment." >&2
              exit 1
            fi
            if [[ "$LEGACY_FRONTEND_HOST" == "${api_host,,}" ]]; then
              echo "LEGACY_FRONTEND_HOST must differ from the canonical API/Frontend host." >&2
              exit 1
            fi
          fi
          if [[ "$API_BASE_URL" != "https://mitmachen.timo-frank.de" ]] || \
             [[ "$FRONTEND_BASE_URL" != "https://mitmachen.timo-frank.de" ]] || \
             [[ "${LEGACY_FRONTEND_HOST:-}" != "pre-gematik.versorgungs-kompass.timo-frank.de" ]]; then
            echo "mitmachen.timo-frank.de must be the canonical origin and pre-gematik.versorgungs-kompass.timo-frank.de its redirect-only legacy host." >&2
            exit 1
          fi

          image_repository="${GAR_REPOSITORY}/${IMAGE_NAME}"
          echo "api_host=$api_host" >> "$GITHUB_OUTPUT"
          echo "registry_host=$registry_host" >> "$GITHUB_OUTPUT"
          echo "image_repository=$image_repository" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud without a key
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Verify approved GCP resource identities and storage hardening
        shell: bash
        run: |
          set -euo pipefail
          project_number="$(gcloud projects describe "$GCP_PROJECT_ID" --format='value(projectNumber)')"
          if [[ -z "$project_number" ]] || [[ "$WIF_PROVIDER" != "projects/${project_number}/locations/global/"* ]]; then
            echo "WIF_PROVIDER does not belong to GCP_PROJECT_ID." >&2
            exit 1
          fi

          project_policy="$(gcloud projects get-iam-policy "$GCP_PROJECT_ID" --format=json)"
          project_iap_bindings="$(jq --compact-output '
            [.bindings[]? | select(.role == "roles/iap.httpsResourceAccessor")]
          ' <<< "$project_policy")"
          if ! jq --exit-status '
            length == 1 and
            (.[0] | has("condition") | not) and
            (.[0].members | length) > 0 and
            ([.[0].members[] | startswith("user:")] | all) and
            ((.[0].members | unique | length) == (.[0].members | length))
          ' <<< "$project_iap_bindings" >/dev/null; then
            echo "Project-level IAP access is not the approved user-only break-glass policy." >&2
            exit 1
          fi
          canonical_break_glass="$(jq --compact-output '.[0].members | sort' <<< "$project_iap_bindings")"
          actual_break_glass_sha256="sha256:$(printf '%s' "$canonical_break_glass" | sha256sum | awk '{print $1}')"
          if [[ "$actual_break_glass_sha256" != "$IAP_PROJECT_BREAK_GLASS_SHA256" ]]; then
            echo "Project-level IAP break-glass membership differs from the protected approved policy pin." >&2
            exit 1
          fi

          registry_repository="${GAR_REPOSITORY##*/}"
          gcloud artifacts repositories describe "$registry_repository" \
            --project "$GCP_PROJECT_ID" \
            --location "$GCP_REGION" \
            --format='value(name)' >/dev/null

          sql_instance="${CLOUD_SQL_INSTANCE_CONNECTION_NAME##*:}"
          actual_sql_identity="$(gcloud sql instances describe "$sql_instance" \
            --project "$GCP_PROJECT_ID" \
            --format='value(connectionName,region)')"
          if [[ "$actual_sql_identity" != "${CLOUD_SQL_INSTANCE_CONNECTION_NAME}"$'\t'"${GCP_REGION}" ]]; then
            echo "Cloud SQL resource identity differs from the approved project/region/instance tuple." >&2
            exit 1
          fi

          for bucket in "$FRONTEND_BUCKET" "$PROFILE_IMAGE_BUCKET" "$CONTACT_IMAGE_BUCKET" "$CONTACT_NOTE_ATTACHMENT_BUCKET" "$STAKEHOLDER_LOGO_BUCKET"; do
            bucket_metadata="$(gcloud storage buckets describe "gs://${bucket}" --raw --format=json)"
            if ! jq --exit-status \
              --arg bucket "$bucket" \
              --arg region "$GCP_REGION" \
              --arg project_number "$project_number" '
                .name == $bucket and
                ((.location // "") | ascii_downcase) == ($region | ascii_downcase) and
                ((.projectNumber // "") | tostring) == $project_number and
                .iamConfiguration.uniformBucketLevelAccess.enabled == true and
                .iamConfiguration.publicAccessPrevention == "enforced"
              ' <<< "$bucket_metadata" >/dev/null; then
              echo "A configured bucket is not an approved, private resource of GCP_PROJECT_ID/GCP_REGION." >&2
              exit 1
            fi
          done

      - name: Connect to GKE through the DNS endpoint
        shell: bash
        run: |
          set -euo pipefail
          gcloud container clusters get-credentials "$GKE_CLUSTER_NAME" \
            --project "$GCP_PROJECT_ID" \
            --location "$GKE_LOCATION" \
            --dns-endpoint
          kubectl version --client
          kubectl auth can-i get deployments --namespace "$K8S_NAMESPACE"

      - name: Materialize and validate custom IAP OAuth credentials
        shell: bash
        run: |
          set -euo pipefail
          oauth_temp_dir="$(mktemp -d)"
          oauth_source_file="${oauth_temp_dir}/oauth.json"
          oauth_client_id_file="${oauth_temp_dir}/client_id"
          oauth_client_secret_file="${oauth_temp_dir}/client_secret"
          oauth_kubernetes_secret_file="${oauth_temp_dir}/kubernetes-secret.json"
          oauth_kubernetes_secret_update_file="${oauth_temp_dir}/kubernetes-secret-update.json"
          cleanup() {
            rm -f \
              "$oauth_source_file" \
              "$oauth_client_id_file" \
              "$oauth_client_secret_file" \
              "$oauth_kubernetes_secret_file" \
              "$oauth_kubernetes_secret_update_file"
            rmdir "$oauth_temp_dir" 2>/dev/null || true
          }
          trap cleanup EXIT
          umask 077

          gcloud secrets versions access latest \
            --project "$GCP_PROJECT_ID" \
            --secret "$IAP_OAUTH_BOOTSTRAP_SECRET_NAME" \
            --out-file "$oauth_source_file" \
            --quiet >/dev/null

          if ! jq --exit-status '
            type == "object" and
            (.client_id | type == "string" and length > 0) and
            (.client_secret | type == "string" and length > 0)
          ' "$oauth_source_file" >/dev/null; then
            echo "The IAP OAuth bootstrap secret must be JSON with non-empty client_id and client_secret strings." >&2
            exit 1
          fi

          jq --exit-status --join-output '.client_id' "$oauth_source_file" > "$oauth_client_id_file"
          jq --exit-status --join-output '.client_secret' "$oauth_source_file" > "$oauth_client_secret_file"

          kubectl create namespace "$K8S_NAMESPACE" \
            --dry-run=client \
            --output=yaml \
            | kubectl apply \
                --server-side \
                --force-conflicts \
                --field-manager=pre-gematik-deployer \
                --filename=- >/dev/null
          kubectl --namespace "$K8S_NAMESPACE" create secret generic "$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" \
            --from-file="client_id=${oauth_client_id_file}" \
            --from-file="client_secret=${oauth_client_secret_file}" \
            --dry-run=client \
            --output=json > "$oauth_kubernetes_secret_file"

          if resource_version="$(kubectl --namespace "$K8S_NAMESPACE" get secret \
            "$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" \
            --output=jsonpath='{.metadata.resourceVersion}' 2>/dev/null)"; then
            jq --arg resource_version "$resource_version" \
              '.metadata.resourceVersion = $resource_version' \
              "$oauth_kubernetes_secret_file" > "$oauth_kubernetes_secret_update_file"
            kubectl --namespace "$K8S_NAMESPACE" replace \
              --filename="$oauth_kubernetes_secret_update_file" >/dev/null
          else
            kubectl --namespace "$K8S_NAMESPACE" create \
              --filename="$oauth_kubernetes_secret_file" >/dev/null
          fi

          if ! kubectl --namespace "$K8S_NAMESPACE" get secret "$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" \
            --output=json \
            | jq --exit-status '
                (.data | keys) == ["client_id", "client_secret"] and
                (.data.client_id | length > 0) and
                (.data.client_secret | length > 0)
              ' >/dev/null; then
            echo "The materialized IAP OAuth Secret does not contain exactly the two required non-empty keys." >&2
            exit 1
          fi

      - name: Configure Artifact Registry authentication
        shell: bash
        env:
          REGISTRY_HOST: ${{ steps.config.outputs.registry_host }}
        run: |
          set -euo pipefail
          gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Refuse mutable API image tag reuse
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ steps.config.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
        run: |
          set -euo pipefail
          image_tags="$(gcloud artifacts docker tags list \
            "$IMAGE_REPOSITORY" \
            --format=json)"
          if ! jq --exit-status \
            'type == "array" and all(.[]; (.tag | type) == "string")' \
            <<< "$image_tags" >/dev/null; then
            echo "Artifact Registry returned an invalid tag inventory." >&2
            exit 1
          fi
          if jq --exit-status \
            --arg suffix "/tags/${IMAGE_TAG}" \
            '[.[] | select(.tag | endswith($suffix))] | length > 0' \
            <<< "$image_tags" >/dev/null; then
            echo "API image tag ${IMAGE_TAG} already exists; refusing to overwrite it." >&2
            exit 1
          fi

      - name: Build and push immutable API image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.config.outputs.image_repository }}:${{ needs.validate.outputs.image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=pre-gematik-api
          cache-to: type=gha,mode=max,scope=pre-gematik-api
          provenance: mode=max
          sbom: true

      - name: Scan immutable API image for deploy-blocking vulnerabilities
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ steps.config.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "The container build did not return a valid immutable image digest." >&2
            exit 1
          fi
          scan_dir="$(mktemp -d)"
          trap 'rm -rf -- "$scan_dir"' EXIT
          mkdir -p "$scan_dir/trivy-cache"
          image_ref="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          docker pull "$image_ref"
          docker image save --output "$scan_dir/api-image.tar" "$image_ref"
          docker run --rm \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            --tmpfs /tmp:rw,nosuid,size=2g \
            -v "$scan_dir/api-image.tar:/scan/api-image.tar:ro" \
            -v "$scan_dir/trivy-cache:/cache" \
            aquasec/trivy:0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e \
            image --skip-version-check --cache-dir /cache --input /scan/api-image.tar \
            --scanners vuln --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build and publish target frontend artifact
        shell: bash
        env:
          FRONTEND_RELEASE_ID: ${{ needs.validate.outputs.image_tag }}
          API_IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          bash scripts/build_static_frontend.sh \
            --profile target \
            --output dist/target \
            --api-base-url "$API_BASE_URL" \
            --auth-mode iap
          node scripts/audit_target_assets.mjs --artifact-root dist/target
          node scripts/audit_api_gateway.mjs \
            --production-config dist/target/data/runtime-config.js

          frontend_artifact_digest="$(jq --exit-status --raw-output \
            '.artifactDigest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' \
            dist/target/build-manifest.json)"

          release_uri="gs://${FRONTEND_BUCKET}/releases/${FRONTEND_RELEASE_ID}"
          manifest_path="${RUNNER_TEMP}/frontend-release-manifest.json"
          marker_object="releases/${FRONTEND_RELEASE_ID}/deployment-manifest.json"
          marker_inventory="$(gcloud storage objects list \
            "${release_uri}/deployment-manifest.json" \
            --format=json)"
          if ! jq --exit-status \
            'type == "array" and all(.[]; (.name | type) == "string")' \
            <<< "$marker_inventory" >/dev/null; then
            echo "Cloud Storage returned an invalid release-marker inventory." >&2
            exit 1
          fi
          if jq --exit-status \
            --arg marker "$marker_object" \
            '[.[] | select(.name == $marker)] | length > 0' \
            <<< "$marker_inventory" >/dev/null; then
            echo "Frontend release ${FRONTEND_RELEASE_ID} already exists; refusing to overwrite it." >&2
            exit 1
          fi

          gcloud storage rsync \
            dist/target \
            "$release_uri" \
            --recursive

          jq --null-input \
            --arg schema_version "1" \
            --arg release_id "$FRONTEND_RELEASE_ID" \
            --arg source_revision "$GITHUB_SHA" \
            --arg source_repository "$GITHUB_REPOSITORY" \
            --arg artifact_uri "$release_uri" \
            --arg api_image_digest "$API_IMAGE_DIGEST" \
            --arg frontend_artifact_digest "$frontend_artifact_digest" \
            '{
              schemaVersion: ($schema_version | tonumber),
              releaseId: $release_id,
              sourceRevision: $source_revision,
              sourceRepository: $source_repository,
              artifactUri: $artifact_uri,
              apiImageDigest: $api_image_digest,
              frontendArtifactDigest: $frontend_artifact_digest
            }' > "$manifest_path"
          gcloud storage cp \
            "$manifest_path" \
            "${release_uri}/deployment-manifest.json"
          gcloud storage objects describe \
            "${release_uri}/data/runtime-config.js" \
            --format="value(name)"
          gcloud storage objects describe \
            "${release_uri}/build-manifest.json" \
            --format="value(name)"
          gcloud storage objects describe \
            "${release_uri}/deployment-manifest.json" \
            --format="value(name)"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.2.0

      - name: Deploy API and bind the signed IAP JWT audience
        id: iap
        shell: bash
        env:
          API_HOST: ${{ steps.config.outputs.api_host }}
          IMAGE_REPOSITORY: ${{ steps.config.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "The container build did not return a valid immutable image digest." >&2
            exit 1
          fi

          deploy_release() {
            local iap_audience="$1"
            local -a domain_migration_args=()
            if [[ -n "${LEGACY_FRONTEND_HOST:-}" ]]; then
              local primary_certificate_name=""
              local alias_certificate_name=""
              case "${API_HOST}|${LEGACY_FRONTEND_HOST}" in
                "mitmachen.timo-frank.de|pre-gematik.versorgungs-kompass.timo-frank.de")
                  primary_certificate_name="${HELM_RELEASE}-mitmachen"
                  alias_certificate_name="${HELM_RELEASE}-api"
                  ;;
                *)
                  echo "The canonical and legacy domains do not match the approved pre-gematik certificate pair." >&2
                  return 1
                  ;;
              esac
              domain_migration_args=(
                --set-string "ingress.aliasHosts[0]=${LEGACY_FRONTEND_HOST}"
                --set-string "frontend.hostRedirects[0].host=${LEGACY_FRONTEND_HOST}"
                --set-string "frontend.hostRedirects[0].targetOrigin=${FRONTEND_BASE_URL}"
                --set-string "gke.managedCertificate.name=${primary_certificate_name}"
                --set-string "gke.managedCertificate.additionalCertificates[0].name=${alias_certificate_name}"
                --set-string "gke.managedCertificate.additionalCertificates[0].domains[0]=${LEGACY_FRONTEND_HOST}"
              )
            fi
            helm upgrade --install "$HELM_RELEASE" "$CHART_PATH" \
              --namespace "$K8S_NAMESPACE" \
              --create-namespace \
              --atomic \
              --wait \
              --timeout 15m \
              -f "$GCP_VALUES_PATH" \
              "${domain_migration_args[@]}" \
              --set-string image.repository="$IMAGE_REPOSITORY" \
              --set-string image.tag="$IMAGE_TAG" \
              --set-string image.digest="$IMAGE_DIGEST" \
              --set-string ingress.host="$API_HOST" \
              --set-string "ingress.annotations.kubernetes\\.io/ingress\\.global-static-ip-name=${GKE_INGRESS_IP_NAME}" \
              --set-string "gke.managedCertificate.domains[0]=${API_HOST}" \
              --set-string config.allowedOrigin="$FRONTEND_BASE_URL" \
              --set-string config.apiAuthMode=iap \
              --set-string config.iapJwtAudience="$iap_audience" \
              --set-string frontend.backendConfig.iap.oauthClientCredentialsSecretName="$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" \
              --set-string gke.backendConfig.iap.oauthClientCredentialsSecretName="$IAP_OAUTH_CLIENT_CREDENTIALS_SECRET_NAME" \
              --set-string database.host=127.0.0.1 \
              --set-string database.port=5432 \
              --set-string database.name="$DB_NAME" \
              --set-string database.user="$DB_USER" \
              --set-string database.ssl=disable \
              --set-string frontend.bucketName="$FRONTEND_BUCKET" \
              --set-string frontend.releasePrefix=releases \
              --set-string frontend.contentRevision="$IMAGE_TAG" \
              --set-string gke.cloudSqlProxy.instanceConnectionName="$CLOUD_SQL_INSTANCE_CONNECTION_NAME" \
              --set-string secrets.databasePasswordSecretName="$DB_PASSWORD_SECRET_NAME" \
              --set-string gke.secretSync.projectId="$GCP_PROJECT_ID" \
              --set-string gke.secretSync.secretName="$DB_PASSWORD_SECRET_NAME" \
              --set-string storage.profileImageBucket="$PROFILE_IMAGE_BUCKET" \
              --set-string storage.contactImageBucket="$CONTACT_IMAGE_BUCKET" \
              --set-string storage.contactNoteAttachmentBucket="$CONTACT_NOTE_ATTACHMENT_BUCKET" \
              --set-string storage.stakeholderLogoBucket="$STAKEHOLDER_LOGO_BUCKET"
          }

          # Fail closed while the GKE Ingress controller creates the backend service.
          deploy_release "/projects/0/global/backendServices/0"

          ingress_name="${HELM_RELEASE}-api"
          api_service_name="${HELM_RELEASE}-api"
          frontend_service_name="${HELM_RELEASE}-frontend"
          backend_service=""
          backend_service_id=""
          frontend_backend_service=""
          for attempt in {1..120}; do
            backends_json="$(kubectl --namespace "$K8S_NAMESPACE" get ingress "$ingress_name" \
              --output jsonpath='{.metadata.annotations.ingress\.kubernetes\.io/backends}' 2>/dev/null || true)"
            api_neg_status="$(kubectl --namespace "$K8S_NAMESPACE" get service "$api_service_name" \
              --output jsonpath='{.metadata.annotations.cloud\.google\.com/neg-status}' 2>/dev/null || true)"
            frontend_neg_status="$(kubectl --namespace "$K8S_NAMESPACE" get service "$frontend_service_name" \
              --output jsonpath='{.metadata.annotations.cloud\.google\.com/neg-status}' 2>/dev/null || true)"
            api_neg=""
            frontend_neg=""
            if [[ -n "$api_neg_status" ]]; then
              api_neg="$(jq --raw-output '.network_endpoint_groups | to_entries[0].value // empty' <<< "$api_neg_status")"
            fi
            if [[ -n "$frontend_neg_status" ]]; then
              frontend_neg="$(jq --raw-output '.network_endpoint_groups | to_entries[0].value // empty' <<< "$frontend_neg_status")"
            fi
            if [[ -n "$backends_json" && -n "$api_neg" && -n "$frontend_neg" ]]; then
              while IFS= read -r candidate; do
                backend_json="$(gcloud compute backend-services describe "$candidate" \
                  --project "$GCP_PROJECT_ID" \
                  --global \
                  --format=json 2>/dev/null || true)"
                if [[ -n "$backend_json" ]]; then
                  if jq --exit-status \
                    --arg suffix "/networkEndpointGroups/${api_neg}" \
                    '[.backends[]?.group // "" | endswith($suffix)] | any' \
                    <<< "$backend_json" >/dev/null; then
                    backend_service="$candidate"
                    backend_service_id="$(jq --raw-output '.id // empty' <<< "$backend_json")"
                  fi
                  if jq --exit-status \
                    --arg suffix "/networkEndpointGroups/${frontend_neg}" \
                    '[.backends[]?.group // "" | endswith($suffix)] | any' \
                    <<< "$backend_json" >/dev/null; then
                    frontend_backend_service="$candidate"
                  fi
                fi
              done < <(jq --raw-output 'keys[]' <<< "$backends_json")
            fi
            if [[ "$backend_service_id" =~ ^[0-9]+$ ]] && \
               [[ -n "$frontend_backend_service" ]] && \
               [[ "$frontend_backend_service" != "$backend_service" ]]; then
              break
            fi
            sleep 10
          done

          if [[ ! "$backend_service_id" =~ ^[0-9]+$ ]] || \
             [[ -z "$frontend_backend_service" ]] || \
             [[ "$frontend_backend_service" == "$backend_service" ]]; then
            echo "Could not identify distinct API and frontend GKE backend services; refusing to bind IAP access." >&2
            exit 1
          fi

          project_number="$(gcloud projects describe "$GCP_PROJECT_ID" --format='value(projectNumber)')"
          if [[ ! "$project_number" =~ ^[0-9]+$ ]]; then
            echo "Could not determine the numeric Google Cloud project number." >&2
            exit 1
          fi
          iap_audience="/projects/${project_number}/global/backendServices/${backend_service_id}"

          deploy_release "$iap_audience"

          configured_audience="$(kubectl --namespace "$K8S_NAMESPACE" get configmap "${HELM_RELEASE}-api" \
            --output jsonpath='{.data.IAP_JWT_AUDIENCE}')"
          if [[ "$configured_audience" != "$iap_audience" ]]; then
            echo "The deployed IAP JWT audience does not match the backend service." >&2
            exit 1
          fi

          # envFrom values are read only at container start; load the real audience now.
          kubectl --namespace "$K8S_NAMESPACE" rollout restart \
            "deployment/${HELM_RELEASE}-api"
          kubectl --namespace "$K8S_NAMESPACE" rollout status \
            "deployment/${HELM_RELEASE}-api" \
            --timeout=10m

          all_iap_enabled=0
          for attempt in {1..60}; do
            backends_json="$(kubectl --namespace "$K8S_NAMESPACE" get ingress "$ingress_name" \
              --output jsonpath='{.metadata.annotations.ingress\.kubernetes\.io/backends}' 2>/dev/null || true)"
            if [[ -z "$backends_json" ]]; then
              backends_json='{}'
            fi
            every_backend_protected=1
            # Check only the two backends mapped from the API/frontend NEGs. Some
            # controller versions also annotate an unrelated default backend.
            for candidate in "$backend_service" "$frontend_backend_service"; do
              if ! jq --exit-status --arg candidate "$candidate" 'has($candidate)' \
                <<< "$backends_json" >/dev/null; then
                every_backend_protected=0
                continue
              fi
              iap_enabled="$(gcloud compute backend-services describe "$candidate" \
                --project "$GCP_PROJECT_ID" \
                --global \
                --format='value(iap.enabled)' 2>/dev/null || true)"
              if [[ "${iap_enabled,,}" != "true" ]]; then
                every_backend_protected=0
              fi
            done
            if [[ "$every_backend_protected" == "1" ]]; then
              all_iap_enabled=1
              break
            fi
            sleep 10
          done
          if [[ "$all_iap_enabled" != "1" ]]; then
            echo "IAP is not enabled on every frontend/API backend of the shared GKE Ingress." >&2
            exit 1
          fi

          # Make the resource policy authoritative on exactly the approved group.
          # Project-level IAP access remains the separately managed break-glass path.
          iap_policy_dir="$(mktemp -d)"
          cleanup_iap_policy() {
            rm -f "${iap_policy_dir}"/*.json
            rmdir "$iap_policy_dir" 2>/dev/null || true
          }
          trap cleanup_iap_policy EXIT
          umask 077
          for candidate in "$backend_service" "$frontend_backend_service"; do
            current_policy="${iap_policy_dir}/${candidate}-current.json"
            desired_policy="${iap_policy_dir}/${candidate}-desired.json"
            verified_policy="${iap_policy_dir}/${candidate}-verified.json"
            gcloud iap web get-iam-policy \
              --project "$GCP_PROJECT_ID" \
              --resource-type=backend-services \
              --service "$candidate" \
              --format=json > "$current_policy"
            if ! jq --exit-status --arg member "$IAP_RESOURCE_ACCESS_PRINCIPAL" '
              (.bindings // []) as $bindings |
              ($bindings | length) == 0 or
              (
                ($bindings | length) == 1 and
                $bindings[0].role == "roles/iap.httpsResourceAccessor" and
                $bindings[0].members == [$member] and
                ($bindings[0].condition? == null)
              )
            ' "$current_policy" >/dev/null; then
              echo "A backend-specific IAP policy already contains an unknown member, role or condition; refusing automatic reconciliation." >&2
              exit 1
            fi
            jq --arg member "$IAP_RESOURCE_ACCESS_PRINCIPAL" '
              {
                version: (.version // 1),
                etag: .etag,
                bindings: [{
                  role: "roles/iap.httpsResourceAccessor",
                  members: [$member]
                }]
              }
              | with_entries(select(.value != null))
            ' "$current_policy" > "$desired_policy"
            gcloud iap web set-iam-policy "$desired_policy" \
              --project "$GCP_PROJECT_ID" \
              --resource-type=backend-services \
              --service "$candidate" \
              --quiet >/dev/null
            gcloud iap web get-iam-policy \
              --project "$GCP_PROJECT_ID" \
              --resource-type=backend-services \
              --service "$candidate" \
              --format=json > "$verified_policy"
            if ! jq --exit-status --arg member "$IAP_RESOURCE_ACCESS_PRINCIPAL" '
              (.bindings | length) == 1 and
              .bindings[0].role == "roles/iap.httpsResourceAccessor" and
              .bindings[0].members == [$member]
            ' "$verified_policy" >/dev/null; then
              echo "A backend-specific IAP policy contains an unapproved member or role." >&2
              exit 1
            fi
          done

          echo "audience=$iap_audience" >> "$GITHUB_OUTPUT"
          echo "api_backend_service=$backend_service" >> "$GITHUB_OUTPUT"
          echo "frontend_backend_service=$frontend_backend_service" >> "$GITHUB_OUTPUT"

      - name: Verify rollout, Secret Sync, and fail-closed authentication
        shell: bash
        run: |
          set -euo pipefail
          deployment_name="${HELM_RELEASE}-api"
          service_name="${HELM_RELEASE}-api"
          frontend_deployment_name="${HELM_RELEASE}-frontend"
          frontend_service_name="${HELM_RELEASE}-frontend"

          kubectl --namespace "$K8S_NAMESPACE" rollout status \
            "deployment/${deployment_name}" \
            --timeout=10m
          kubectl --namespace "$K8S_NAMESPACE" rollout status \
            "deployment/${frontend_deployment_name}" \
            --timeout=10m
          kubectl --namespace "$K8S_NAMESPACE" get secret "$DB_PASSWORD_SECRET_NAME" >/dev/null

          kubectl --namespace "$K8S_NAMESPACE" exec \
            --stdin \
            "deployment/${deployment_name}" \
            --container api \
            -- node --input-type=module <<'NODE'
              import { Pool } from "pg";

              const required = ["DB_HOST", "DB_PORT", "DB_NAME", "DB_USER", "DB_PASSWORD"];
              if (required.some((name) => !String(process.env[name] || "").trim())) {
                throw new Error("Required database environment is missing in the API container.");
              }
              const sslMode = String(process.env.DB_SSL_MODE || process.env.DB_SSL || "disable").toLowerCase();
              if (!["disable", "0", "false", "off"].includes(sslMode)) {
                throw new Error("The API-to-proxy database hop must use TLS mode disable.");
              }

              const pool = new Pool({
                host: process.env.DB_HOST,
                port: Number(process.env.DB_PORT),
                database: process.env.DB_NAME,
                user: process.env.DB_USER,
                password: process.env.DB_PASSWORD,
                ssl: false,
                max: 1,
                connectionTimeoutMillis: 15000,
                statement_timeout: 15000
              });

              try {
                const requiredTables = [
                  "profiles", "organizations", "organization_primary_systems", "contacts", "contact_owners",
                  "activity_events", "changes", "import_runs", "contact_notes", "contact_note_attachments",
                  "saved_views", "user_settings", "formats", "format_participants", "hospitation_slots",
                  "hospitations", "hospitation_observations", "hospitation_observation_changes", "roadmap_items",
                  "hospitation_roadmap_assessments", "hospitation_unmet_needs", "expert_groups", "expert_contacts",
                  "expert_organizations", "expert_entity_links", "stakeholder_types", "stakeholder_organizations",
                  "stakeholder_people", "notification_events", "notification_recipients"
                ];
                const connectivity = await pool.query("select 1 as ok");
                if (Number(connectivity.rows[0]?.ok) !== 1) throw new Error("PostgreSQL SELECT 1 failed.");

                const roleState = await pool.query(`
                  select
                    role_state.rolname,
                    role_state.rolinherit,
                    role_state.rolsuper,
                    role_state.rolcreatedb,
                    role_state.rolcreaterole,
                    role_state.rolreplication,
                    role_state.rolbypassrls,
                    pg_has_role(current_user, 'cloudsqlsuperuser', 'MEMBER') as cloudsql_admin_member,
                    pg_has_role(current_user, 'vk_app_runtime', 'MEMBER') as runtime_member,
                    has_schema_privilege(current_user, 'public', 'USAGE') as schema_usage,
                    has_schema_privilege(current_user, 'public', 'CREATE') as schema_create
                  from pg_catalog.pg_roles role_state
                  where role_state.rolname = current_user
                `);
                const role = roleState.rows[0];
                if (!role || role.rolname !== process.env.DB_USER || !role.rolinherit
                    || role.rolsuper || role.rolcreatedb || role.rolcreaterole
                    || role.rolreplication || role.rolbypassrls
                    || role.cloudsql_admin_member || !role.runtime_member
                    || !role.schema_usage || role.schema_create) {
                  throw new Error("Database login violates the vk_app_runtime least-privilege contract.");
                }

                const memberships = await pool.query(`
                  select granted_role.rolname as granted_role
                    from pg_catalog.pg_auth_members membership
                    join pg_catalog.pg_roles granted_role on granted_role.oid = membership.roleid
                    join pg_catalog.pg_roles member_role on member_role.oid = membership.member
                   where member_role.rolname = current_user
                   order by granted_role.rolname
                `);
                if (memberships.rows.length !== 1 || memberships.rows[0]?.granted_role !== "vk_app_runtime") {
                  throw new Error("Database login must have exactly one explicit role membership: vk_app_runtime.");
                }

                const runtimeRole = await pool.query(`
                  select rolcanlogin, rolsuper, rolcreatedb, rolcreaterole, rolreplication, rolbypassrls
                    from pg_catalog.pg_roles
                   where rolname = 'vk_app_runtime'
                `);
                const runtime = runtimeRole.rows[0];
                if (!runtime || runtime.rolcanlogin || runtime.rolsuper || runtime.rolcreatedb
                    || runtime.rolcreaterole || runtime.rolreplication || runtime.rolbypassrls) {
                  throw new Error("vk_app_runtime is missing or has unsafe role attributes.");
                }

                const contract = await pool.query(`
                  select requested.name,
                         to_regclass(format('public.%I', requested.name)) is not null as present,
                         case
                           when to_regclass(format('public.%I', requested.name)) is null then false
                           else has_table_privilege(current_user, format('public.%I', requested.name), 'SELECT')
                            and has_table_privilege(current_user, format('public.%I', requested.name), 'INSERT')
                            and has_table_privilege(current_user, format('public.%I', requested.name), 'UPDATE')
                            and has_table_privilege(current_user, format('public.%I', requested.name), 'DELETE')
                            and not has_table_privilege(current_user, format('public.%I', requested.name), 'TRUNCATE')
                         end as runtime_ready
                    from unnest($1::text[]) as requested(name)
                   order by requested.name
                `, [requiredTables]);
                const invalid = contract.rows.filter((row) => !row.present || !row.runtime_ready);
                if (invalid.length) {
                  throw new Error(`Required schema tables are missing or have incomplete runtime grants: ${invalid.map((row) => row.name).join(", ")}`);
                }

                const objectPrivileges = await pool.query(`
                  select
                    has_sequence_privilege(current_user, 'public.activity_events_id_seq', 'USAGE')
                      and has_sequence_privilege(current_user, 'public.activity_events_id_seq', 'SELECT')
                      and has_sequence_privilege(current_user, 'public.changes_id_seq', 'USAGE')
                      and has_sequence_privilege(current_user, 'public.changes_id_seq', 'SELECT')
                      and has_sequence_privilege(current_user, 'public.hospitation_observation_changes_id_seq', 'USAGE')
                      and has_sequence_privilege(current_user, 'public.hospitation_observation_changes_id_seq', 'SELECT')
                      as sequences_ready,
                    (
                      select bool_and(has_function_privilege(current_user, to_regprocedure(required.signature), 'EXECUTE'))
                        from unnest($1::text[]) as required(signature)
                    ) as functions_ready
                `, [[
                  "public.pre_gematik_touch_updated_at()",
                  "public.pre_gematik_text_array_join(text[])",
                  "public.pre_gematik_activity_contact_references_match(jsonb,text)",
                  "public.pre_gematik_log_hospitation_observation_change()"
                ]]);
                if (!objectPrivileges.rows[0]?.sequences_ready || !objectPrivileges.rows[0]?.functions_ready) {
                  throw new Error("Database sequence or function grants violate the runtime contract.");
                }

                const ddlClient = await pool.connect();
                let ddlDenied = false;
                try {
                  await ddlClient.query("begin");
                  try {
                    await ddlClient.query("create table public.vk_deployment_ddl_must_be_denied (id integer)");
                  } catch (error) {
                    if (error.code !== "42501") throw error;
                    ddlDenied = true;
                  }
                } finally {
                  await ddlClient.query("rollback").catch(() => {});
                  ddlClient.release();
                }
                if (!ddlDenied) throw new Error("Database login unexpectedly created an object in public.");

                console.log(`Database least-privilege smoke OK: ${requiredTables.length} tables, sequences, functions, and DDL denial.`);
              } finally {
                await pool.end();
              }
          NODE

          port_forward_log="${RUNNER_TEMP}/pre-gematik-api-port-forward.log"
          frontend_port_forward_log="${RUNNER_TEMP}/pre-gematik-frontend-port-forward.log"
          kubectl --namespace "$K8S_NAMESPACE" port-forward \
            "service/${service_name}" 18080:80 \
            >"$port_forward_log" 2>&1 &
          port_forward_pid=$!
          kubectl --namespace "$K8S_NAMESPACE" port-forward \
            "service/${frontend_service_name}" 18082:80 \
            >"$frontend_port_forward_log" 2>&1 &
          frontend_port_forward_pid=$!
          cleanup() {
            kill "$port_forward_pid" >/dev/null 2>&1 || true
            kill "$frontend_port_forward_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          api_healthy=0
          frontend_healthy=0
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:18080/api/healthz >/dev/null; then
              api_healthy=1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:18082/index.html >/dev/null; then
              frontend_healthy=1
            fi
            if [[ "$api_healthy" == "1" && "$frontend_healthy" == "1" ]]; then
              break
            fi
            sleep 2
          done
          if [[ "$api_healthy" != "1" ]]; then
            cat "$port_forward_log"
            echo "The in-cluster API health smoke test failed." >&2
            exit 1
          fi
          if [[ "$frontend_healthy" != "1" ]]; then
            cat "$frontend_port_forward_log"
            echo "The in-cluster frontend smoke test failed." >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            http://127.0.0.1:18082/data/runtime-config.js \
            --output "${RUNNER_TEMP}/pre-gematik-frontend-config.js"
          grep --fixed-strings --quiet 'dataMode: "api"' "${RUNNER_TEMP}/pre-gematik-frontend-config.js"
          grep --fixed-strings --quiet 'authMode: "iap"' "${RUNNER_TEMP}/pre-gematik-frontend-config.js"
          grep --fixed-strings --quiet 'requireApiGateway: true' "${RUNNER_TEMP}/pre-gematik-frontend-config.js"

          spoof_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header 'x-goog-authenticated-user-email: accounts.google.com:spoof@example.invalid' \
            --header 'x-goog-authenticated-user-id: accounts.google.com:spoof' \
            http://127.0.0.1:18080/api/session)"
          if [[ "$spoof_status" != "401" ]]; then
            echo "Unsigned identity headers were not rejected; received HTTP $spoof_status." >&2
            exit 1
          fi

      - name: Require external IAP boundary smoke test
        if: ${{ inputs.require_external_smoke == true }}
        shell: bash
        run: |
          set -euo pipefail
          for target in "${FRONTEND_BASE_URL}/" "${API_BASE_URL}/api/healthz"; do
            status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
              --max-time 30 \
              "$target")"
            case "$status" in
              302|401|403) ;;
              *)
                echo "Expected an unauthenticated IAP response for $target, received HTTP $status." >&2
                exit 1
                ;;
            esac
          done

      - name: Summarize deployment
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## pre-gematik deployment"
            echo
            echo "- Revision: \`${GITHUB_SHA}\`"
            echo "- Release: \`${IMAGE_TAG}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Namespace: \`${K8S_NAMESPACE}\`"
            echo "- Canonical origin: \`${FRONTEND_BASE_URL}\`"
            if [[ -n "${LEGACY_FRONTEND_HOST:-}" ]]; then
              echo "- Legacy origin: \`https://${LEGACY_FRONTEND_HOST}\` (certificate retained; redirects to canonical origin)"
            fi
            echo "- API backend service: \`${API_BACKEND_SERVICE}\`"
            echo "- Frontend backend service: \`${FRONTEND_BACKEND_SERVICE}\`"
            echo "- GCP resource identities, private bucket policy and IAP bindings: verified (values redacted)"
            echo "- Internal API/frontend health and target frontend config: passed"
            echo "- Cloud SQL connection and required schema: passed"
            echo "- Unsigned-header rejection: passed"
          } >> "$GITHUB_STEP_SUMMARY"
