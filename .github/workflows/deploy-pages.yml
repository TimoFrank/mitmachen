name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - frontend/app/**
      - frontend/map/**
      - frontend/pages/mitmachen/**
      - frontend/data/demo-data.js
      - frontend/data/demo-api.js
      - frontend/data/data-service.js
      - frontend/data/sector-registry.js
      - frontend/data/hospitation-model.js
      - frontend/data/hospitation-export.js
      - frontend/data/activity-model.js
      - frontend/data/document-text-extractor.js
      - frontend/vendor/**
      - public/**
      - config/pages-demo/**
      - config/deployment-profile.schema.json
      - package.json
      - package-lock.json
      - scripts/build_static_frontend.sh
      - scripts/audit_public_assets.mjs
      - scripts/check_deployment_governance.mjs
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    name: Build isolated Pages artifact
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_static_frontend.sh \
            --profile pages \
            --output dist/pages
          node scripts/audit_public_assets.mjs --artifact-root dist/pages
          jq --exit-status --raw-output \
            '.artifactDigest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' \
            dist/pages/build-manifest.json >/dev/null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist/pages

  deploy:
    name: Publish Pages artifact
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

      - name: Verify public Demo profile
        shell: bash
        env:
          PUBLIC_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          page_root="${PUBLIC_PAGE_URL%/}"
          cache_buster="revision=${GITHUB_SHA}"
          curl_retry_args=(
            --silent
            --show-error
            --retry 6
            --retry-delay 5
            --retry-all-errors
            --max-time 30
          )
          demo_data_path="${RUNNER_TEMP}/pages-demo-data.js"
          demo_api_path="${RUNNER_TEMP}/pages-demo-api.js"
          runtime_config_path="${RUNNER_TEMP}/pages-runtime-config.js"
          app_path="${RUNNER_TEMP}/pages-versorgungs-kompass.html"
          registration_path="${RUNNER_TEMP}/pages-versorgungs-netzwerk.html"

          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/?${cache_buster}" >/dev/null
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/demo/?${cache_buster}" >/dev/null
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/data/demo-data.js?${cache_buster}" \
            --output "$demo_data_path"
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/data/demo-api.js?${cache_buster}" --output "$demo_api_path"
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/data/runtime-config.js?${cache_buster}" --output "$runtime_config_path"
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/versorgungs-kompass.html?${cache_buster}" --output "$app_path"
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/mitmachen/versorgungs-netzwerk.html?${cache_buster}" --output "$registration_path"
          curl --fail "${curl_retry_args[@]}" \
            "${page_root}/data/data-service.js?${cache_buster}" >/dev/null

          grep --extended-regexp --ignore-case --quiet 'synthetisch|fiktiv' "$demo_data_path"
          grep --extended-regexp --quiet 'dataMode:[[:space:]]*"demo"' "$runtime_config_path"
          grep --extended-regexp --quiet 'authMode:[[:space:]]*"anonymous-demo"' "$runtime_config_path"
          grep --extended-regexp --quiet 'apiBaseUrl:[[:space:]]*""' "$runtime_config_path"
          grep --extended-regexp --quiet 'requireApiGateway:[[:space:]]*false' "$runtime_config_path"
          for app_label in Versorgung Auswertung Aktivitäten Stakeholder Expertenkreis Hospitationen Beobachtungen Fragebogen Dashboard Formate Teams; do
            grep --fixed-strings --quiet "$app_label" "$app_path"
          done
          node - "$app_path" "$registration_path" <<'NODE'
          const fs = require("node:fs");
          const html = fs.readFileSync(process.argv[2], "utf8");
          const positions = ["./data/demo-data.js", "./data/demo-api.js", "./data/data-service.js"].map((value) => html.indexOf(value));
          if (!(positions[0] >= 0 && positions[0] < positions[1] && positions[1] < positions[2])) {
            throw new Error("Demo-Datensatz, Demo-API und Data-Service werden nicht in der freigegebenen Reihenfolge geladen.");
          }
          if (/auth-(?:config|guard|login)\.js/i.test(html)) {
            throw new Error("Die Pages-App referenziert ein Auth-Skript.");
          }
          const registrationHtml = fs.readFileSync(process.argv[3], "utf8");
          if (!registrationHtml.includes('<script src="./versorgungs-netzwerk.js"></script>')) {
            throw new Error("Die statische Netzwerkregistrierung lädt ihr freigegebenes Interaktionsskript nicht.");
          }
          if (/data\/(?:runtime-config|demo-data|demo-api)\.js/i.test(registrationHtml)) {
            throw new Error("Die statische Netzwerkregistrierung bindet unerwartet Demo-Datenadapter ein.");
          }
          NODE
          if grep --extended-regexp --ignore-case --quiet 'supabase|service[_-]?role|stakeholder-data|expertenkreis-data|versorgungs-kompass-data' "$demo_data_path" "$demo_api_path" "$runtime_config_path" "$app_path" "$registration_path"; then
            echo "GitHub Pages serves data or runtime references outside the public Demo contract." >&2
            exit 1
          fi

          for forbidden_path in \
            login.html \
            set-password.html \
            auth-config.js \
            auth-guard.js \
            auth-login.js \
            data/supabase-config.js \
            data/versorgungs-kompass-data.csv \
            data/versorgungs-kompass-data.js \
            data/expertenkreis-data.js \
            data/stakeholder-data.js \
            data/patienten-data.js; do
            status="$(curl "${curl_retry_args[@]}" --output /dev/null --write-out '%{http_code}' "${page_root}/${forbidden_path}?${cache_buster}")"
            if [ "$status" != "404" ]; then
              echo "GitHub Pages unexpectedly serves forbidden asset ${forbidden_path} (HTTP ${status})." >&2
              exit 1
            fi
          done
