<!doctype html><html><head><meta charset="utf-8"><style>
  body { margin: 0; font: 13px system-ui, sans-serif; background: #f5f7fb; color: #17275f; }
  .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; padding: 18px; align-items: start; }
  figure { margin: 0; background: white; border: 1px solid #dce3f5; border-radius: 8px; overflow: hidden; }
  figcaption { padding: 8px 10px; font-weight: 700; border-bottom: 1px solid #dce3f5; }
  img { width: 100%; height: auto; display: block; }
  .mobile img { width: 64%; margin: 0 auto; }
</style></head><body><main class="grid">
<figure class="desktop"><figcaption>desktop-page-1.png</figcaption><img src="desktop-page-1.png" /></figure>
<figure class="desktop"><figcaption>desktop-page-2.png</figcaption><img src="desktop-page-2.png" /></figure>
<figure class="desktop"><figcaption>desktop-page-3.png</figcaption><img src="desktop-page-3.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-1.png</figcaption><img src="mobile-page-1.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-2.png</figcaption><img src="mobile-page-2.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-3.png</figcaption><img src="mobile-page-3.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-4.png</figcaption><img src="mobile-page-4.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-5.png</figcaption><img src="mobile-page-5.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-6.png</figcaption><img src="mobile-page-6.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-7.png</figcaption><img src="mobile-page-7.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-8.png</figcaption><img src="mobile-page-8.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-9.png</figcaption><img src="mobile-page-9.png" /></figure>
<figure class="mobile"><figcaption>mobile-page-10.png</figcaption><img src="mobile-page-10.png" /></figure>
</main></body></html>
