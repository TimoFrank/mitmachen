<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>#Mitmachen – Versorgungsnetzwerk</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body {
      background:
        radial-gradient(1200px 680px at 4% -8%, rgba(170, 216, 228, 0.42), transparent 64%),
        radial-gradient(980px 520px at 102% -12%, rgba(205, 230, 218, 0.34), transparent 60%),
        #f4f7f8;
      color: rgba(0,0,0,0.82);
    }
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 60px minmax(0, 1fr);
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .topbar img { width: 42px; height: 42px; object-fit: contain; flex: 0 0 auto; }
    .topbar h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 0.01em; }
    .topbar .meta { margin-left: auto; color: rgba(0,0,0,0.48); font-size: 12px; font-weight: 600; }

    .content {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
      gap: 18px;
      min-height: 0;
    }
    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 16px;
      box-shadow: 0 14px 28px rgba(24, 54, 68, 0.10);
      padding: 16px;
    }
    .kicker {
      margin: 0;
      color: rgba(27,95,125,0.92);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .sidebar h2 {
      margin: 6px 0 8px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.08;
      color: rgba(0,0,0,0.88);
    }
    .sidebar p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: rgba(0,0,0,0.58);
    }
    .list-head {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(27,95,125,0.78);
    }
    .filter-group {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }
    .filter-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(27,95,125,0.78);
    }
    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .category-chip {
      border: 1px solid rgba(1,14,82,0.14);
      background: rgba(255,255,255,0.92);
      color: rgba(0,0,0,0.68);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }
    .category-chip:hover {
      border-color: rgba(1,14,82,0.28);
      color: #010E52;
    }
    .category-chip.active {
      background: #010E52;
      color: #fff;
      border-color: #010E52;
    }
    .state-filter-badge {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 10px;
      background: rgba(1,14,82,0.08);
      border: 1px solid rgba(1,14,82,0.14);
      color: #010E52;
      font-size: 11px;
      font-weight: 700;
    }
    .state-filter-badge button {
      border: 0;
      background: transparent;
      color: #010E52;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      padding: 0;
    }
    .list {
      min-height: 0;
      overflow: auto;
      border: 1px solid rgba(31,107,136,0.10);
      border-radius: 12px;
      background: rgba(255,255,255,0.86);
    }
    .list.is-collapsed {
      display: none;
    }
    .list-empty {
      border: 1px dashed rgba(31,107,136,0.16);
      border-radius: 12px;
      background: rgba(246,250,251,0.92);
      padding: 14px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(0,0,0,0.54);
    }
    .row {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
    }
    .row:hover { background: rgba(7,71,110,0.04); }
    .row.active { background: rgba(7,71,110,0.08); }
    .row:last-child { border-bottom: 0; }
    .row-swatch {
      width: 8px;
      height: 8px;
      margin-top: 5px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.14);
    }
    .row-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(0,0,0,0.80);
      line-height: 1.3;
    }
    .row-meta {
      margin-top: 2px;
      font-size: 12px;
      color: rgba(0,0,0,0.52);
    }

    .detail {
      border: 1px solid rgba(31,107,136,0.12);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,251,252,0.88));
      padding: 14px;
      min-height: 280px;
      display: grid;
      gap: 10px;
    }
    .detail-head {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .detail-visual {
      width: 96px;
      height: 96px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(31,107,136,0.10);
      border: 1px solid rgba(31,107,136,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(7,71,110,0.10);
    }
    .detail-title {
      font-size: 15px;
      font-weight: 800;
      color: rgba(0,0,0,0.84);
      line-height: 1.3;
    }
    .detail-sub {
      font-size: 12px;
      color: rgba(0,0,0,0.52);
      margin-top: 2px;
    }
    .detail-line {
      font-size: 12px;
      color: rgba(0,0,0,0.62);
      line-height: 1.35;
    }
    .contact-head {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .contact-visual {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(7,71,110,0.10);
      border: 1px solid rgba(7,71,110,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .contact-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .contact-name {
      font-size: 12.5px;
      font-weight: 700;
      color: rgba(0,0,0,0.76);
      line-height: 1.25;
    }
    .contact-role {
      font-size: 12px;
      color: rgba(0,0,0,0.54);
      line-height: 1.25;
      margin-top: 1px;
    }
    .detail a { color: rgba(7,71,110,0.92); text-decoration: underline; }

    .map-shell {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.07);
      background: rgba(255,255,255,0.86);
      box-shadow: 0 14px 30px rgba(24, 54, 68, 0.10);
      min-height: calc(100vh - 96px);
      position: relative;
    }
    #map { width: 100%; height: 100%; min-height: calc(100vh - 96px); background: #eef4f6; }
    .leaflet-control-attribution { display: none; }
    .state-hover-label {
      background: rgba(255,255,255,0.90);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      color: #010E52;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
    }
    .state-hover-label::before { display: none; }
    .cat-pin {
      width: 26px;
      height: 36px;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.24));
    }
    @media (max-width: 960px){
      .content { grid-template-columns: 1fr; }
      .map-shell, #map { min-height: 68vh; }
      .sidebar h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <img src="../public/gematik-logo.svg" alt="gematik"/>
      <h1>#Mitmachen</h1>
      <div class="meta">Web-Variante · reduziert</div>
    </header>

    <main class="content">
      <section class="sidebar">
        <div>
          <p class="kicker">Digitale Versorgung</p>
          <h2>Unser Versorgungs-Netzwerk</h2>
          <p>Mitmachen für eine vernetzte Gesundheitsversorgung.</p>
          <div class="filter-group">
            <div class="filter-label">Einrichtungsfilter</div>
            <div id="category-filters" class="category-filters"></div>
          </div>
          <div class="list-head">
            <span>Einrichtungen</span>
            <span id="count">0</span>
          </div>
          <div id="state-filter-badge" class="state-filter-badge" style="display:none;">
            <span id="state-filter-label">Filter aktiv</span>
            <button id="state-filter-clear" type="button">Aufheben</button>
          </div>
        </div>
        <div id="list" class="list"></div>
        <div id="detail" class="detail"></div>
      </section>

      <section class="map-shell">
        <div id="map"></div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./data/de-geojson.js"></script>
  <script src="./data/state-polygons.js"></script>

    };
    const LOGO_OVERRIDES = {

      "48": "https://www.hdz-nrw.de/_assets/f4a8f5ee7fa419107b694a50b2951ab6/Media/hdz_nrw.svg",

    };
    const PERSON_PHOTO_OVERRIDES = {
      "2": "https://www.alexianer-berlin-hedwigkliniken.de/fileadmin/img/karte-alexianer-verbund.jpg",

      "16": "https://www.diakonie-vohwinkel.de/fileadmin/Content/Contentbilder/Ambulanter_Dienst/Content2024/Content_SZ_18.jpg",
      "20": "https://gastropraxis.berlin/wp-content/uploads/2024/10/Wilkommen-bei-uns-scaled.jpg",
      "24": "https://gemeinschaftspraxis-schmarl.de/wp-content/uploads/2025/07/Gruppe--1500x630.jpg",
      "39": "https://www.hausaerzte-am-spritzenhaus.de/images/carouselslide/Praxis12.jpg",
      "48": "https://www.hdz-nrw.de/fileadmin/_processed_/0/2/csm_HDZ_DIZ_-Prof-Reger-Tan1896-teaser_91dc9707c0.jpg",
      "53": "https://www.innklinikum.de/fileadmin/user_upload/Altoetting/Paed/Bilder/vlaho-02.png",

      "66": "https://nordring-apotheke-berlin.de/wp-content/uploads/2023/05/APOTHEKEMITHERZlogo-RZ04profilbildrund03RGB-1024x1024.png",
      "69": "https://foev-verbund.de/wp-content/uploads/2020/08/foev-stefanie-roesler.jpg",
      "77": "https://www.unfallchirurgie-bamberg.de/quality_auto/3039b6_3a7fbbd2133e49f99691bab1971b4998~mv2.jpg",
      "80": "https://praxis-hanefeld.com/wp-content/uploads/2025/06/marc-hanefeld-sp2-2-743x1024.jpg",
      "87": "https://sana-praevention.de/wp-content/uploads/2022/06/hamburg.jpg",
      "90": "https://www.joho.de/fileadmin/_processed_/d/2/csm_98_-_St._Josefs-Hospital_Wiesbaden_GmbH_Wiesbaden-98_d3f0f68f87.jpg",
      "96": "https://www.umh.de/fileadmin/_processed_/4/2/csm_20240709_UMH_Foto_Tom_Schulze_0370_web_b4fce66a48.jpg",
      "102": "https://www.uniklinikum-leipzig.de/PublishingImages/Seiten/Startseite/tdot-mbfs-uniklinikum-leipzig.jpg",
      "111": "https://witzleben-apotheke.de/wp-content/uploads/2023/03/karriere-sharing-pharmaziepraktikum.jpg"
    };

    const elCount = document.getElementById("count");
    const elList = document.getElementById("list");
    const elDetail = document.getElementById("detail");
    const elCategoryFilters = document.getElementById("category-filters");
    const elStateFilterBadge = document.getElementById("state-filter-badge");
    const elStateFilterLabel = document.getElementById("state-filter-label");
    const elStateFilterClear = document.getElementById("state-filter-clear");
    elCount.textContent = DATA.length;

    const map = L.map("map", { zoomControl: true, minZoom: 5, maxZoom: 7 });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd",
      maxZoom: 12,
      attribution: "&copy; OpenStreetMap-Mitwirkende &copy; CARTO"
    }).addTo(map);

    function toLatLngs(ringLngLat){ return ringLngLat.map((pt) => [pt[1], pt[0]]); }
    function germanyOuterRings(fc){
      const geom = fc.features[0].geometry;
      const holes = [];
      if (geom.type === "Polygon") holes.push(toLatLngs(geom.coordinates[0]));
      if (geom.type === "MultiPolygon") geom.coordinates.forEach((poly) => holes.push(toLatLngs(poly[0])));
      return holes;
    }

    const worldRing = [[-90,-180],[-90,180],[90,180],[90,-180]];
    const holes = germanyOuterRings(DE_GEOJSON);
    L.polygon([worldRing, ...holes], {
      stroke: false,
      fillColor: "#fff",
      fillOpacity: 0.30,
      interactive: false
    }).addTo(map);

    const stateLayer = L.geoJSON(STATE_POLYGONS, {
      style: {
        color: "#B4BBD0",
        weight: 1.2,
        fillColor: "#B4BBD0",
        fillOpacity: 0.36
      },
      interactive: true,
      onEachFeature: (feature, layer) => {
        layer.bindTooltip(feature.properties.name, {
          sticky: true,
          direction: "top",
          className: "state-hover-label",
          opacity: 1
        });
        layer.on("mouseover", () => {
          layer.setStyle({
            color: "#010E52",
            weight: 1.45,
            fillColor: "#010E52",
            fillOpacity: 0.86
          });
          layer.openTooltip();
        });
        layer.on("click", () => {
          const name = feature.properties.name;
          activeStateFilter = activeStateFilter === name ? "" : name;
          stateLayer.eachLayer((stateItem) => {
            const stateName = stateItem.feature && stateItem.feature.properties ? stateItem.feature.properties.name : "";
            const selected = activeStateFilter && stateName === activeStateFilter;
            stateItem.setStyle({
              color: selected ? "#010E52" : "#B4BBD0",
              weight: selected ? 1.5 : 1.2,
              fillColor: selected ? "#010E52" : "#B4BBD0",
              fillOpacity: selected ? 0.70 : 0.36
            });
          });
          renderList();
        });
        layer.on("mouseout", () => {
          const stateName = layer.feature && layer.feature.properties ? layer.feature.properties.name : "";
          const selected = activeStateFilter && stateName === activeStateFilter;
          if (selected) {
            layer.setStyle({
              color: "#010E52",
              weight: 1.5,
              fillColor: "#010E52",
              fillOpacity: 0.70
            });
          } else {
            stateLayer.resetStyle(layer);
          }
          layer.closeTooltip();
        });
      }
    }).addTo(map);

    const germanyLayer = L.geoJSON(DE_GEOJSON, {
      style: { color: "rgba(0,0,0,0.34)", weight: 1.2, fill: false },
      interactive: false
    }).addTo(map);

    const bounds = germanyLayer.getBounds();
    map.fitBounds(bounds.pad(0.12));
    map.setZoom(Math.min(map.getZoom(), 8));
    map.setMaxBounds(bounds.pad(0.30));

    const markerById = new Map();
    let selectedId = "";
    let activeStateFilter = "";
    let activeCategoryFilter = "";

    function domainFromUrl(url){
      try {
        const host = new URL(url).hostname.toLowerCase().replace(/^www\./, "");
        return host;
      } catch (_error) {
        return "";
      }
    }

    function automaticLogo(entry){
      const sid = String(entry.source_id || "");
      if (LOGO_OVERRIDES[sid]) return LOGO_OVERRIDES[sid];
      if (entry.logo_url || entry.logo) return entry.logo_url || entry.logo;
      const domain = domainFromUrl(entry.url);
      if (!domain) return "";
      return `https://${domain}/favicon.ico`;
    }

    function automaticContactPhoto(entry){
      const sid = String(entry.source_id || "");
      if (PERSON_PHOTO_OVERRIDES[sid]) return PERSON_PHOTO_OVERRIDES[sid];
      if (entry.person_photo || entry.contact_photo || entry.photo) return entry.person_photo || entry.contact_photo || entry.photo;
      const name = encodeURIComponent((entry.person_name || entry.name || "Kontakt").replace(/[^a-zA-Z0-9äöüÄÖÜß .-]/g, "").trim());
      return `https://ui-avatars.com/api/?name=${name}&background=EAF4F8&color=0B4B6F&size=128&rounded=true&bold=true`;
    }

    function pinIcon(color){
      return L.divIcon({
        className: "",
        html: `<svg class="cat-pin" viewBox="0 0 26 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13 35c5.8-8 11-12.8 11-19.6a11 11 0 1 0-22 0c0 6.8 5.2 11.6 11 19.6z" fill="${color}"/>
          <circle cx="13" cy="13" r="4.2" fill="rgba(255,255,255,0.92)"/>
        </svg>`,
        iconSize: [26,36],
        iconAnchor: [13,35],
        popupAnchor: [0,-28]
      });
    }

    function detailVisual(entry){
      const image = entry.logo || entry.logo_url || entry.facility_photo || entry.image || automaticLogo(entry);
      if (image) return `<img src="${image}" alt="Logo ${entry.name}"/>`;
      return `<img src="${AVATARS[entry.category] || AVATARS["Arztpraxen"]}" alt="Kategorie ${entry.category}"/>`;
    }

    function contactVisual(entry){
      const personImage = automaticContactPhoto(entry);
      if (personImage) return `<img src="${personImage}" alt="Ansprechpartner ${entry.person_name || entry.name}"/>`;
      return `<svg viewBox="0 0 44 44" width="24" height="24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="22" cy="16.5" r="6.5" fill="rgba(7,71,110,0.56)"/><path d="M11 33c1.8-5.8 6.2-9.2 11-9.2s9.2 3.4 11 9.2" fill="none" stroke="rgba(7,71,110,0.56)" stroke-width="3.4" stroke-linecap="round"/></svg>`;
    }

    function cleanedDescription(entry){
      const raw = (entry.description || "").trim();
      if (!raw) return "";
      return raw
        .split("·")
        .map((part) => part.trim())
        .filter((part) => {
          const lowered = part.toLowerCase();
          if (!lowered) return false;
          if (lowered.includes("sektor")) return false;
          if (lowered.includes("fachrichtung")) return false;
          if (lowered.includes("primärsystem")) return false;
          if (lowered.includes("privater kontakt")) return false;
          if (lowered.includes("frank, timo")) return false;
          if (lowered.includes("wahle, laila")) return false;
          if (lowered.includes("kontakt über")) return false;
          if (lowered.includes("brief an")) return false;
          if (lowered.includes("vorstand")) return false;
          return true;
        })
        .join(" · ");
    }

    function detailHtml(entry){
      const contactName = entry.person_name || "Ansprechpartner folgt";
      const role = entry.person_title ? `<div class="contact-role">${entry.person_title}</div>` : "";
      const website = entry.url ? `<div class="detail-line"><a href="${entry.url}" target="_blank" rel="noopener">Website öffnen</a></div>` : "";
      const descText = cleanedDescription(entry);
      const desc = descText ? `<div class="detail-line">${descText}</div>` : "";
      return `
        <div class="detail-head">
          <div class="detail-visual">${detailVisual(entry)}</div>
          <div>
            <div class="detail-title">${entry.name}</div>
            <div class="detail-sub">${entry.category} • ${entry.city}</div>
          </div>
        </div>
        <div class="contact-head">
          <div class="contact-visual">${contactVisual(entry)}</div>
          <div>
            <div class="contact-name">${contactName}</div>
            ${role}
          </div>
        </div>
        ${desc}
        ${website}
      `;
    }

    function detailIntroHtml(){
      return `
        <div class="detail-line">
          Wählen Sie links eine Einrichtungsart oder auf der Karte ein Bundesland, um freigegebene Kontakte anzuzeigen.
        </div>
      `;
    }

    function renderCategoryFilters(){
      const categories = Object.keys(CATEGORY_COLORS).filter((category) =>
        DATA.some((entry) => entry.category === category)
      );
      elCategoryFilters.innerHTML = "";

      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.className = `category-chip${activeCategoryFilter ? "" : " active"}`;
      allButton.textContent = "Alle";
      allButton.addEventListener("click", () => {
        activeCategoryFilter = "";
        renderList();
      });
      elCategoryFilters.appendChild(allButton);

      categories.forEach((category) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category-chip${activeCategoryFilter === category ? " active" : ""}`;
        button.textContent = category;
        button.addEventListener("click", () => {
          activeCategoryFilter = activeCategoryFilter === category ? "" : category;
          renderList();
        });
        elCategoryFilters.appendChild(button);
      });
    }

    function renderList(){
      const hasActiveFilter = Boolean(activeStateFilter || activeCategoryFilter);
      const visible = DATA.filter((entry) => {
        if (activeStateFilter && entry.state !== activeStateFilter) return false;
        if (activeCategoryFilter && entry.category !== activeCategoryFilter) return false;
        return true;
      });
      elCount.textContent = visible.length;
      renderCategoryFilters();
      if (activeStateFilter) {
        elStateFilterBadge.style.display = "flex";
        elStateFilterLabel.textContent = activeCategoryFilter
          ? `Filter aktiv: ${activeStateFilter} · ${activeCategoryFilter}`
          : `Filter aktiv: ${activeStateFilter}`;
      } else {
        elStateFilterBadge.style.display = activeCategoryFilter ? "flex" : "none";
        if (activeCategoryFilter) {
          elStateFilterLabel.textContent = `Filter aktiv: ${activeCategoryFilter}`;
        }
      }

      elList.classList.toggle("is-collapsed", !hasActiveFilter);
      elList.innerHTML = "";
      if (!hasActiveFilter) {
        elDetail.innerHTML = detailIntroHtml();
        return;
      }

      visible.forEach((entry) => {
        const id = String(entry.source_id || entry.name);
        const row = document.createElement("div");
        row.className = `row${selectedId === id ? " active" : ""}`;
        const color = CATEGORY_COLORS[entry.category] || "#555";
        row.innerHTML = `
          <span class="row-swatch" style="background:${color};"></span>
          <div>
            <div class="row-title">${entry.name}</div>
            <div class="row-meta">${entry.category} • ${entry.city}</div>
          </div>
        `;
        row.addEventListener("click", () => selectEntry(entry));
        elList.appendChild(row);
      });

      if (selectedId) {
        const stillVisible = visible.some((entry) => String(entry.source_id || entry.name) === selectedId);
        if (!stillVisible) {
          selectedId = "";
        }
      }
      if (!selectedId && visible.length > 0) {
        selectEntry(visible[0], { openPopup: false });
        return;
      }
      if (visible.length === 0) {
        elDetail.innerHTML = `<div class="detail-line">Keine freigegebenen Einträge für diesen Filter.</div>`;
      }
    }

    function selectEntry(entry, options = {}){
      const { openPopup = false } = options;
      const id = String(entry.source_id || entry.name);
      selectedId = id;
      renderList();
      elDetail.innerHTML = detailHtml(entry);
      if (openPopup) {
        const marker = markerById.get(id);
        if (marker) marker.openPopup();
      }
    }

    DATA.forEach((entry) => {
      if (typeof entry.lat !== "number" || typeof entry.lon !== "number") return;
      const color = CATEGORY_COLORS[entry.category] || "#555";
      const id = String(entry.source_id || entry.name);
      const marker = L.marker([entry.lat, entry.lon], { icon: pinIcon(color) });
      const website = entry.url ? `<div style="margin-top:8px;"><a href="${entry.url}" target="_blank" rel="noopener">Website</a></div>` : "";
      marker.bindPopup(`
        <div style="min-width:220px;">
          <div style="font-weight:700; font-size:14px; color:rgba(0,0,0,0.82);">${entry.name}</div>
          <div style="color:rgba(0,0,0,0.55); font-size:12px;">${entry.category} • ${entry.city}</div>
          ${website}
        </div>
      `, { autoPan: false });
      marker.on("click", () => selectEntry(entry, { openPopup: false }));
      marker.addTo(map);
      markerById.set(id, marker);
    });

    renderList();
    elStateFilterClear.addEventListener("click", () => {
      activeStateFilter = "";
      activeCategoryFilter = "";
      selectedId = "";
      stateLayer.eachLayer((layer) => stateLayer.resetStyle(layer));
      renderList();
    });
    if (DATA.length > 0) {
      elDetail.innerHTML = detailIntroHtml();
    } else {
      elDetail.innerHTML = `<div class="detail-line">Keine freigegebenen Einträge vorhanden.</div>`;
    }
  </script>
</body>
</html>
