      <path d="m28 60 20 20 43-48" fill="none" stroke="#087b5c" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="142" y="49" fill="#10236e" font-size="30" font-weight="800">Gemeinsam lernen</text>
      <text x="142" y="87" fill="#59657a" font-size="22">Beobachtungen verbinden</text>
      <rect x="142" y="113" width="185" height="18" rx="9" fill="#dfe6f2"/>
      <rect x="142" y="148" width="116" height="18" rx="9" fill="#dfe6f2"/>
    </g>
  </g>
  <g fill="#ffffff" stroke="#155fe4" stroke-width="8">
