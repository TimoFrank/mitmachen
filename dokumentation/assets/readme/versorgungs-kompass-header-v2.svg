<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title description">
  <title id="title">#Mitmachen und Versorgungs-Kompass</title>
  <desc id="description">Markenheader des Versorgungs-Kompasses mit den Modulen Versorgung, Stakeholder, Hospitation und Formate.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#010E52"/>
      <stop offset="1" stop-color="#10236E"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#FFFFFF" stroke-opacity=".045"/>
    </pattern>
  </defs>
  <rect width="1600" height="500" rx="30" fill="url(#background)"/>
  <rect width="1600" height="500" rx="30" fill="url(#grid)"/>
  <circle cx="1460" cy="42" r="210" fill="#00FF65" fill-opacity=".07"/>
  <circle cx="1498" cy="488" r="260" fill="#559EE8" fill-opacity=".08"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="90" y="86" fill="#00FF65" font-size="34" font-weight="800" letter-spacing="-.8">#</text>
    <text x="115" y="86" fill="#FFFFFF" font-size="34" font-weight="800" letter-spacing="-.8">Mitmachen</text>
  </g>

  <g transform="translate(82 146) scale(3)">
    <rect x="11" y="9" width="18" height="18" rx="6" transform="rotate(45 20 18)" fill="#45A1FF"/>
    <rect x="34" y="24" width="18" height="18" rx="6" transform="rotate(45 43 33)" fill="#FF9A4D"/>
    <rect x="11" y="39" width="18" height="18" rx="6" transform="rotate(45 20 48)" fill="#E8F1FF"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="310" y="235" fill="#FFFFFF" font-size="72" font-weight="800" letter-spacing="-2.4">Versorgungs-Kompass</text>

    <g font-size="22" font-weight="800">
      <rect x="310" y="280" width="184" height="54" rx="27" fill="#559EE8"/>
      <text x="402" y="314" fill="#17275F" text-anchor="middle">Versorgung</text>

      <rect x="510" y="280" width="202" height="54" rx="27" fill="#43B391"/>
      <text x="611" y="314" fill="#17275F" text-anchor="middle">Stakeholder</text>

      <rect x="728" y="280" width="190" height="54" rx="27" fill="#E0A44D"/>
      <text x="823" y="314" fill="#17275F" text-anchor="middle">Hospitation</text>

      <rect x="934" y="280" width="152" height="54" rx="27" fill="#A980DA"/>
      <text x="1010" y="314" fill="#17275F" text-anchor="middle">Formate</text>
    </g>

    <text x="310" y="408" fill="#D6E2FF" font-size="29" font-weight="500">Menschen vernetzen. Beobachtungen verstehen. Wissen gemeinsam nutzen.</text>
  </g>
</svg>
