server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index login.html index.html;

  location / {
    try_files $uri $uri/ /login.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|svg|webp|ico|json|webmanifest)$ {
    expires 1h;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
